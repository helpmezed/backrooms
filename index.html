<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms Private Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Saira+Stencil+One&display=swap" rel="stylesheet">
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050508; 
            color: #e2e8f0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .stencil-font { font-family: 'Saira Stencil One', cursive; font-weight: normal; }

        /* Canvas Background */
        #starfield {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
            background-image: radial-gradient(circle at 15% 50%, rgba(20, 15, 45, 0.8), transparent 50%),
                              radial-gradient(circle at 85% 30%, rgba(10, 30, 50, 0.8), transparent 50%);
        }

        /* --- Notifications --- */
        #notification-container { position: fixed; top: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .system-notification { background: rgba(0, 210, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(0, 210, 255, 0.3); border-left: 4px solid #00d2ff; color: #fff; padding: 14px 24px; border-radius: 4px 10px 10px 4px; font-size: 14px; letter-spacing: 1px; box-shadow: 0 4px 20px rgba(0, 210, 255, 0.15); display: flex; align-items: center; gap: 12px; animation: hudSlideIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .system-notification.success { border-left-color: #00ff66; }
        .system-notification.fade-out { animation: hudFadeOut 0.5s forwards; }
        @keyframes hudSlideIn { 0% { transform: translateX(120%) skewX(-15deg); opacity: 0; } 100% { transform: translateX(0) skewX(0); opacity: 1; } }
        @keyframes hudFadeOut { 100% { transform: translateX(120%) scale(0.9); opacity: 0; } }

        /* --- Login Screen --- */
        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(15px); }
        .login-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); }
        .login-title { font-size: 28px; color: #00d2ff; letter-spacing: 2px; text-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .avatar-upload-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto; border-radius: 50%; background: rgba(0, 0, 0, 0.4); border: 2px dashed rgba(255, 255, 255, 0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
        #avatar-preview { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 50%; }
        #avatar-input { display: none; }
        .login-input { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 16px; border-radius: 10px; font-size: 16px; outline: none; }

        /* --- App Container --- */
        #app-container { display: none; flex-direction: column; height: 100%; width: 50%; margin: 0 auto; position: relative; background: rgba(10, 10, 15, 0.4); border-left: 1px solid rgba(255, 255, 255, 0.05); border-right: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 0 50px rgba(0, 0, 0, 0.5); }
        @media (max-width: 800px) { #app-container { width: 100%; border: none; } }

        /* --- App Header --- */
        #app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(20px); z-index: 10;
        }
        .header-title { font-size: 18px; color: #00d2ff; letter-spacing: 1px; text-transform: uppercase; }
        .header-title span { color: #fff; }
        
        .header-controls { display: flex; align-items: center; gap: 15px; }

        #user-count-badge {
            background: rgba(0, 210, 255, 0.1); border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 6px 12px; border-radius: 20px; font-size: 11px; color: #00d2ff;
            display: flex; align-items: center; gap: 6px;
        }
        .pulse-dot { width: 6px; height: 6px; background: #00ff66; border-radius: 50%; box-shadow: 0 0 8px #00ff66; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #invite-btn {
            background: rgba(0, 210, 255, 0.1); border: 1px solid #00d2ff; color: #fff;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; display: flex; align-items: center;
            font-size: 14px; transition: all 0.2s;
        }
        #invite-btn:hover { background: rgba(0, 210, 255, 0.3); }

        /* --- Chat Messages --- */
        #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        .message { position: relative; padding: 14px 18px; border-radius: 4px 12px 12px 12px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-left: 3px solid #00d2ff; max-width: 90%; animation: glitchIn 0.4s ease-out forwards; }
        @keyframes glitchIn { 0% { opacity: 0; transform: translateY(10px) skewX(-5deg); filter: blur(5px); } 100% { opacity: 1; transform: translateY(0); filter: blur(0); } }
        
        .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .chat-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .username { font-size: 15px; color: #00d2ff; text-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }
        .timestamp { margin-left: auto; font-size: 11px; color: rgba(255, 255, 255, 0.3); }
        .media-attachment { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid rgba(255, 255, 255, 0.1); }

        /* --- Input Area --- */
        #input-area { padding: 20px 24px; background: rgba(10, 10, 15, 0.8); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; gap: 12px; align-items: flex-end; }
        #input-wrapper { flex: 1; background: rgba(0, 0, 0, 0.4); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; }
        #chat-input { width: 100%; background: transparent; border: none; color: #fff; padding: 16px; font-size: 15px; outline: none; resize: none; min-height: 52px; }
        .btn { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white; border: none; padding: 0 28px; border-radius: 10px; cursor: pointer; height: 52px; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4); }
        
        #file-preview-area { display: flex; gap: 10px; padding: 0; }
        #file-preview-area:not(:empty) { padding: 10px; }
        .file-preview-item { width: 50px; height: 50px; border-radius: 6px; border: 1px solid #00d2ff; overflow: hidden; }
        .file-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="notification-container"></div>

<div id="login-screen">
    <div class="login-card">
        <h1 class="login-title stencil-font">Link Established</h1>
        <label for="avatar-input" class="avatar-upload-wrapper">
            <span id="upload-icon">📷</span>
            <img id="avatar-preview" src="" alt="Avatar Preview">
        </label>
        <input type="file" id="avatar-input" accept="image/*">
        <input type="text" id="username-input" class="login-input" placeholder="Enter Callsign..." autocomplete="off">
        <button class="btn stencil-font" id="join-btn">Initialize</button>
    </div>
</div>

<div id="app-container">
    <div id="app-header">
        <div class="header-title stencil-font">BACKROOMS <span>PRIVATE CHAT</span></div>
        
        <div class="header-controls">
            <div id="user-count-badge" class="stencil-font">
                <div class="pulse-dot"></div>
                ONLINE: <span id="count-number">0</span>
            </div>

            <button id="invite-btn" class="stencil-font">Invite Link</button>
            
            <button id="disconnect-btn" class="stencil-font" style="background: rgba(255, 51, 51, 0.1); border: 1px solid #ff3333; color: #ff3333; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;">
                Disconnect
            </button>
        </div>
    </div>

    <div id="chat-container"></div>
    
    <div id="input-area">
        <label for="file-input" style="cursor:pointer; padding:15px; background:rgba(255,255,255,0.05); border-radius:10px">📎</label>
        <input type="file" id="file-input" multiple style="display:none">
        
        <div id="input-wrapper">
            <div id="file-preview-area"></div>
            <textarea id="chat-input" placeholder="..." rows="1"></textarea>
        </div>
        
        <button class="btn stencil-font" id="send-btn">Send</button>
    </div>
</div>

<script>
    const socket = io(); 

    // --- User Count ---
    socket.on('user count', (count) => {
        document.getElementById('count-number').textContent = count;
    });

    // --- Starfield Background ---
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 150}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            z: Math.random() * 2, radius: Math.random() * 1.5, alpha: Math.random()
        }));
    }
    initStars();
    window.addEventListener('resize', initStars);
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.x -= s.z * 0.5; if(s.x < 0) s.x = canvas.width;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`; ctx.fill();
        });
        requestAnimationFrame(animateStars);
    }
    animateStars();

    // --- Identity Logic ---
    let currentUser = { name: 'Guest', avatarUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2300d2ff"><circle cx="12" cy="8" r="4"/><path d="M12 14c-4 0-7 2-7 6v1h14v-1c0-4-3-6-7-6z"/></svg>' };

    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('backroomsUser');
        if (saved) {
            currentUser = JSON.parse(saved);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        }
    });

    document.getElementById('join-btn').onclick = () => {
        const val = document.getElementById('username-input').value.trim();
        if (val) currentUser.name = val;
        localStorage.setItem('backroomsUser', JSON.stringify(currentUser));
        location.reload();
    };

    document.getElementById('disconnect-btn').onclick = () => {
        localStorage.removeItem('backroomsUser');
        location.reload();
    };

    document.getElementById('avatar-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentUser.avatarUrl = ev.target.result;
            document.getElementById('avatar-preview').src = ev.target.result;
            document.getElementById('avatar-preview').style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- Messaging ---
    function parseMarkdown(text) {
        let html = text.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        const imgRegex = /(https?:\/\/[^\s]+?\.(?:gif|png|jpg|jpeg|webp))/gi;
        return html.replace(imgRegex, (m) => `<img src="${m}" class="media-attachment">`);
    }

    function renderMessage(data) {
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `
            <div class="user-header">
                <img src="${data.user.avatarUrl}" class="chat-avatar">
                <span class="username stencil-font">${data.user.name}</span>
                <span class="timestamp">${data.timestamp}</span>
            </div>
            <div class="msg-text">${parseMarkdown(data.text)}</div>
        `;
        if (data.files) {
            data.files.forEach(f => {
                const media = document.createElement(f.type.startsWith('image/') ? 'img' : 'video');
                media.src = f.data; media.className = 'media-attachment'; if(f.type.startsWith('video/')) media.controls = true;
                div.appendChild(media);
            });
        }
        document.getElementById('chat-container').appendChild(div);
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
    }

    socket.on('chat message', renderMessage);
    socket.on('load history', (history) => history.forEach(renderMessage));

    let selectedFiles = [];
    document.getElementById('file-input').onchange = (e) => {
        selectedFiles = Array.from(e.target.files);
        const area = document.getElementById('file-preview-area');
        area.innerHTML = '';
        selectedFiles.forEach(f => {
            const item = document.createElement('div'); item.className = 'file-preview-item';
            const img = document.createElement('img'); img.src = URL.createObjectURL(f);
            item.appendChild(img); area.appendChild(item);
        });
    };

    async function handleSend() {
        const text = document.getElementById('chat-input').value;
        if (!text.trim() && selectedFiles.length === 0) return;
        const filePromises = selectedFiles.map(file => new Promise(res => {
            const r = new FileReader(); r.onload = (e) => res({ type: file.type, data: e.target.result }); r.readAsDataURL(file);
        }));
        const files = await Promise.all(filePromises);
        socket.emit('chat message', {
            user: currentUser, text, files, timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        document.getElementById('chat-input').value = '';
        document.getElementById('file-preview-area').innerHTML = ''; selectedFiles = [];
    }

    document.getElementById('send-btn').onclick = handleSend;
    document.getElementById('chat-input').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

    document.getElementById('invite-btn').onclick = () => {
        navigator.clipboard.writeText(window.location.href);
        alert('Invite link copied!');
    };
</script>
</body>
</html>
