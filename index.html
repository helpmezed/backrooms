<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backroom Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-color: #030712;
            --glass-bg: rgba(10, 15, 30, 0.7);
            --glass-border: rgba(0, 238, 255, 0.2);
            --accent-cyan: #00eeff;
            --accent-magenta: #ff00ea;
            --bubble-other: rgba(20, 25, 40, 0.8);
            --bubble-self: rgba(0, 238, 255, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --font-ui: 'Orbitron', sans-serif;
            --font-text: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--font-text);
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(0, 238, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 238, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        #notification-container { position: fixed; top: 20px; right: 50%; transform: translateX(50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .system-notification { background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(10px); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 12px 20px; border-radius: 4px; font-family: var(--font-ui); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; animation: slideDown 0.4s forwards; box-shadow: 0 0 15px rgba(0, 238, 255, 0.2); }
        .system-notification.error { border-color: var(--accent-magenta); color: var(--accent-magenta); box-shadow: 0 0 15px rgba(255, 0, 234, 0.2); }
        @keyframes slideDown { 0% { transform: translateY(-20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(10px); }
        .login-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 40px; border-radius: 8px; width: 100%; max-width: 360px; text-align: center; display: flex; flex-direction: column; gap: 24px; box-shadow: 0 0 40px rgba(0, 238, 255, 0.1); }
        .login-title { font-family: var(--font-ui); font-size: 24px; color: var(--text-main); text-transform: uppercase; letter-spacing: 2px; }
        .avatar-upload-wrapper { position: relative; width: 88px; height: 88px; margin: 0 auto; background: rgba(0, 238, 255, 0.05); border: 1px dashed var(--accent-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; color: var(--accent-cyan); font-family: var(--font-ui); font-size: 10px; transition: all 0.3s; }
        .avatar-upload-wrapper:hover { background: rgba(0, 238, 255, 0.1); transform: scale(1.05); }
        .avatar-upload-wrapper.has-image { border-style: solid; }
        #avatar-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .login-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: var(--text-main); padding: 16px; border-radius: 4px; outline: none; transition: all 0.3s; }
        .login-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 238, 255, 0.2); }
        .login-error { color: var(--accent-magenta); font-family: var(--font-ui); font-size: 11px; margin-top: -10px; display: none; }

        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 1200px; margin: 0 auto; background: transparent; }
        @media (min-width: 768px) {
            #app-container { height: 95vh; margin-top: 2.5vh; border-radius: 8px; background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); overflow: hidden;}
        }

        #app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--glass-border); }
        .header-title { font-family: var(--font-ui); color: var(--accent-cyan); letter-spacing: 2px; display: flex; align-items: center; gap: 8px; }
        .connection-status { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-magenta); box-shadow: 0 0 8px var(--accent-magenta); transition: all 0.3s; }
        .connection-status.connected { background: var(--accent-cyan); box-shadow: 0 0 8px var(--accent-cyan); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .header-controls { display: flex; align-items: center; gap: 12px; }

        #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; position: relative; }
        
        .message-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: springIn 0.5s forwards; position: relative; }
        .message-wrapper.other { align-self: flex-start; }
        .message-wrapper.self { align-self: flex-end; align-items: flex-end; }
        
        @keyframes springIn { 0% { opacity: 0; filter: brightness(3) blur(5px); transform: translateY(20px) scale(0.95); } 100% { opacity: 1; filter: brightness(1); transform: translateY(0) scale(1); } }
        
        .user-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .self .user-header { display: none; } /* Hide header for self messages */
        .chat-avatar { width: 26px; height: 26px; border-radius: 4px; border: 1px solid var(--user-color, var(--glass-border)); object-fit: cover; }
        .username { font-family: var(--font-ui); font-size: 11px; color: var(--user-color, var(--text-muted)); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        
        .message { padding: 16px 20px; font-size: 16px; line-height: 1.5; word-wrap: break-word; position: relative; border-radius: 4px; backdrop-filter: blur(5px); }
        .other .message { background: var(--bubble-other); color: var(--text-main); border: 1px solid var(--glass-border); border-left: 3px solid var(--user-color, var(--glass-border)); }
        .self .message { background: var(--bubble-self); color: var(--accent-cyan); border: 1px solid rgba(0, 238, 255, 0.3); border-right: 3px solid var(--accent-cyan); }
        
        .message-wrapper:hover .message { animation: neonBreath 1.5s infinite alternate ease-in-out; }
        @keyframes neonBreath { 0% { box-shadow: 0 0 5px rgba(0, 238, 255, 0.1); } 100% { box-shadow: 0 0 20px var(--user-color, var(--accent-cyan)); } }
        
        .reply-snippet { background: rgba(0, 0, 0, 0.5); border-left: 2px solid var(--reply-color); padding: 8px 12px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .reply-snippet:hover { background: rgba(0, 238, 255, 0.1); transform: translateX(4px); }
        .snippet-name { color: var(--reply-color); font-weight: 700; font-family: var(--font-ui); font-size: 11px; display: block; margin-bottom: 2px; }
        .snippet-text { color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; max-width: 250px; }

        .media-attachment { max-width: 100%; border-radius: 4px; margin-top: 8px; border: 1px solid var(--glass-border); }
        img.media-attachment { cursor: zoom-in; }
        video.media-attachment { background: #000; outline: none; cursor: pointer; }

        #media-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 2000; cursor: zoom-out; flex-direction: column; gap: 20px; }
        #media-overlay img, #media-overlay video { max-width: 90%; max-height: 85vh; border: 1px solid var(--accent-cyan); animation: holographicPop 0.3s ease-out; }
        #media-overlay .media-caption { font-family: var(--font-ui); font-size: 12px; color: var(--text-muted); }
        @keyframes holographicPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .reply-action-btn { position: absolute; top: 50%; transform: translateY(-50%); opacity: 0; background: rgba(0, 238, 255, 0.1); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .message-wrapper:hover .reply-action-btn { opacity: 1; }
        .other .reply-action-btn { right: -40px; }
        .self .reply-action-btn { left: -40px; }

        #typing-indicator { display: none; padding: 8px 24px; font-family: var(--font-ui); font-size: 11px; color: var(--accent-cyan); letter-spacing: 1px; animation: pulse 1.5s infinite; }
        #typing-indicator.active { display: block; }

        #input-area { padding: 16px 24px; background: rgba(3, 7, 18, 0.8); border-top: 1px solid var(--glass-border); display: flex; gap: 12px; align-items: flex-end; }
        #input-wrapper { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
        #chat-input { width: 100%; background: transparent; border: none; color: var(--text-main); padding: 14px 18px; font-size: 15px; outline: none; resize: none; min-height: 48px; font-family: var(--font-text); }
        .btn { font-family: var(--font-ui); background: rgba(0, 238, 255, 0.1); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
        .btn:hover { background: rgba(0, 238, 255, 0.2); box-shadow: 0 0 15px rgba(0, 238, 255, 0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: transparent; border-color: var(--text-muted); color: var(--text-muted); }
        .btn-secondary:hover { border-color: var(--text-main); color: var(--text-main); }
        .btn-danger { color: var(--accent-magenta); border-color: var(--accent-magenta); }
        .btn-danger:hover { background: rgba(255, 0, 234, 0.1); box-shadow: 0 0 15px rgba(255, 0, 234, 0.3); }

        .file-preview-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: rgba(0, 238, 255, 0.1); border: 1px solid var(--glass-border); border-radius: 4px; font-size: 12px; color: var(--text-muted); }
        .file-preview-item img { width: 30px; height: 30px; object-fit: cover; border-radius: 2px; }
        .file-preview-item .remove-file { cursor: pointer; color: var(--accent-magenta); font-weight: bold; padding: 0 4px; }
        .file-preview-item .remove-file:hover { color: var(--text-main); }

        .reply-preview-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: rgba(0, 238, 255, 0.05); border-bottom: 1px solid var(--glass-border); }
        .reply-preview-header span { font-size: 12px; color: var(--text-muted); }
        .reply-preview-header button { background: none; border: none; color: var(--accent-magenta); cursor: pointer; font-family: var(--font-ui); font-size: 11px; }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }
    </style>
</head>
<body>

<div id="notification-container"></div>

<div id="media-overlay" onclick="closeMediaOverlay()">
    <div id="media-content"></div>
    <div class="media-caption">Click anywhere to close</div>
</div>

<div id="login-screen">
    <div class="login-card">
        <div class="login-title">Initialize Link</div>
        <label for="avatar-input" class="avatar-upload-wrapper" id="avatar-label">
            <span id="upload-icon">Bio-Scan</span>
            <img id="avatar-preview" src="" alt="Avatar Preview">
        </label>
        <input type="file" id="avatar-input" accept="image/*" style="display:none">
        <div class="login-error" id="login-error">Invalid input detected</div>
        <input type="text" id="username-input" class="login-input" placeholder="Enter Callsign" autocomplete="off" maxlength="20">
        <button class="btn" id="join-btn">Engage</button>
    </div>
</div>

<div id="app-container">
    <div id="app-header">
        <div class="header-title">
            <div class="connection-status" id="conn-status"></div>
            BACKROOM
        </div>
        <div class="header-controls">
            <div id="user-count-badge">
                <span id="count-number">0</span> Active
            </div>
            <button id="invite-btn" class="btn btn-secondary">Uplink</button>
            <button id="logout-btn" class="btn btn-secondary btn-danger">Sever</button>
        </div>
    </div>

    <div id="chat-container"></div>
    
    <div id="typing-indicator">
        <span id="typing-text">Someone is transmitting...</span>
    </div>
    
    <div id="input-area">
        <label for="file-input" class="btn" style="padding:12px; display:flex; align-items:center; justify-content:center">+</label>
        <input type="file" id="file-input" multiple accept="image/*,video/*" style="display:none">
        
        <div id="input-wrapper">
            <div id="reply-preview" class="reply-preview-header" style="display:none;">
                <span id="reply-preview-text"></span>
                <button onclick="cancelReply()">CANCEL</button>
            </div>
            <div id="file-preview-area" style="display:flex; gap:8px; padding:8px; flex-wrap:wrap;"></div>
            <textarea id="chat-input" placeholder="Input sequence..." rows="1"></textarea>
        </div>
        
        <button class="btn" id="send-btn" style="height:48px; padding:0 20px">SEND</button>
    </div>
</div>

<script>
    const socket = io(); 
    const messageStore = {};
    let activeReplyTarget = null;
    let currentUser = { 
        name: 'User', 
        avatarUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2300eeff"><circle cx="12" cy="8" r="4"/><path d="M12 14c-4 0-7 2-7 6v1h14v-1c0-4-3-6-7-6z"/></svg>',
        id: null
    };
    let selectedFiles = [];
    let isConnected = false;
    let typingTimeout = null;

    // Notification system
    function showNotification(text, type = 'info') {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div');
        notif.className = `system-notification ${type === 'error' ? 'error' : ''}`;
        notif.innerHTML = (type === 'error' ? '◉ ' : '◇ ') + text;
        container.appendChild(notif);
        setTimeout(() => {
            notif.style.opacity = '0';
            notif.style.transform = 'translateY(-20px)';
            setTimeout(() => notif.remove(), 400);
        }, 3000);
    }

    // Connection status
    function updateConnectionStatus(connected) {
        isConnected = connected;
        const status = document.getElementById('conn-status');
        if (connected) {
            status.classList.add('connected');
            showNotification('Neural link established');
        } else {
            status.classList.remove('connected');
            showNotification('Link severed', 'error');
        }
    }

    socket.on('connect', () => {
        updateConnectionStatus(true);
        currentUser.id = socket.id;
        // Re-emit user info if we have it
        if (currentUser.name !== 'User') {
            socket.emit('user joined', currentUser);
        }
    });

    socket.on('disconnect', () => {
        updateConnectionStatus(false);
    });

    socket.on('connect_error', (err) => {
        showNotification('Connection failed: ' + err.message, 'error');
    });

    // Session management
    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('futureChatUser');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.name && parsed.name.trim()) {
                    currentUser = { ...currentUser, ...parsed };
                    enterChat();
                }
            } catch (e) {
                localStorage.removeItem('futureChatUser');
            }
        }
    });

    function enterChat() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        socket.emit('user joined', currentUser);
    }

    function logout() {
        if (confirm('Sever neural link? This will clear your session.')) {
            localStorage.removeItem('futureChatUser');
            socket.disconnect();
            location.reload();
        }
    }

    // Text scramble effect
    function scrambleText(element, finalValue) {
        if (!finalValue) return;
        const chars = "!<>-_\\/[]{}—=+*^?#________";
        let iteration = 0;
        const interval = setInterval(() => {
            element.innerText = finalValue.split("")
                .map((char, index) => {
                    if (index < iteration) return finalValue[index];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join("");
            if (iteration >= finalValue.length) { 
                clearInterval(interval);
                element.innerText = finalValue;
            }
            iteration += finalValue.length / 10;
        }, 40);
    }

    // Color generator
    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        return `hsl(${Math.abs(hash) % 360}, 100%, 65%)`;
    }

    // Media overlay
    window.viewMedia = (src, type = 'image') => {
        const overlay = document.getElementById('media-overlay');
        const content = document.getElementById('media-content');
        content.innerHTML = type === 'video' 
            ? `<video src="${src}" controls autoplay style="max-width:90%; max-height:85vh; border:1px solid var(--accent-cyan)"></video>`
            : `<img src="${src}" style="max-width:90%; max-height:85vh; border:1px solid var(--accent-cyan)">`;
        overlay.style.display = 'flex';
    };

    window.closeMediaOverlay = () => {
        document.getElementById('media-overlay').style.display = 'none';
        document.getElementById('media-content').innerHTML = '';
    };

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeMediaOverlay();
            if (activeReplyTarget) cancelReply();
        }
    });

    // Avatar upload with error handling
    document.getElementById('avatar-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        if (!file.type.startsWith('image/')) {
            showNotification('Invalid format. Use image data.', 'error');
            return;
        }

        const reader = new FileReader();
        reader.onerror = () => showNotification('Bio-scan failed', 'error');
        reader.onload = (ev) => {
            currentUser.avatarUrl = ev.target.result;
            document.getElementById('avatar-preview').src = ev.target.result;
            document.getElementById('avatar-preview').style.display = 'block';
            document.getElementById('upload-icon').style.display = 'none';
            document.getElementById('avatar-label').classList.add('has-image');
        };
        reader.readAsDataURL(file);
    });

    // File handling with previews
    function updateFilePreviews() {
        const area = document.getElementById('file-preview-area');
        area.innerHTML = selectedFiles.map((file, idx) => {
            const isImage = file.type.startsWith('image/');
            const isVideo = file.type.startsWith('video/');
            
            if (isImage) {
                const url = URL.createObjectURL(file);
                return `
                    <div class="file-preview-item">
                        <img src="${url}" alt="">
                        <span>${file.name.slice(0, 10)}${file.name.length > 10 ? '...' : ''}</span>
                        <span class="remove-file" onclick="removeFile(${idx})">×</span>
                    </div>
                `;
            }
            
            return `
                <div class="file-preview-item">
                    <span>${isVideo ? '▶' : '📄'} ${file.name.slice(0, 15)}${file.name.length > 15 ? '...' : ''}</span>
                    <span class="remove-file" onclick="removeFile(${idx})">×</span>
                </div>
            `;
        }).join('');
    }

    window.removeFile = (idx) => {
        selectedFiles.splice(idx, 1);
        updateFilePreviews();
        if (selectedFiles.length === 0) {
            document.getElementById('file-input').value = '';
        }
    };

    document.getElementById('file-input').addEventListener('change', (e) => {
        selectedFiles = Array.from(e.target.files).slice(0, 5); // Limit to 5 files
        if (e.target.files.length > 5) {
            showNotification('Limited to 5 data packets', 'error');
        }
        updateFilePreviews();
    });

    // Reply system
    window.initiateReply = (id) => {
        const msg = messageStore[id];
        if (!msg) return;
        activeReplyTarget = msg;
        document.getElementById('reply-preview-text').innerText = `Replying to ${msg.user.name}: ${msg.text?.slice(0, 40) || '[Attachment]'}${msg.text?.length > 40 ? '...' : ''}`;
        document.getElementById('reply-preview').style.display = 'flex';
        document.getElementById('chat-input').focus();
    };

    window.cancelReply = () => {
        activeReplyTarget = null;
        document.getElementById('reply-preview').style.display = 'none';
    };

    window.scrollToMessage = (id) => {
        // In a real app, this would scroll to and highlight the message
        const msg = messageStore[id];
        if (msg) {
            showNotification(`Viewing message from ${msg.user.name}`);
        }
    };

    // Message rendering with reply support
    function renderMessage(data, isHistory = false) {
        const container = document.getElementById('chat-container');
        
        // Robust self-detection using socket ID
        const isSelf = data.user.id === socket.id || data.user.name === currentUser.name;
        const userColor = stringToColor(data.user.name);

        if (!data.id) data.id = Math.random().toString(36).substr(2, 9);
        messageStore[data.id] = data;

        const div = document.createElement('div');
        div.className = `message-wrapper ${isSelf ? 'self' : 'other'}`;
        div.id = `msg-${data.id}`;
        div.style.setProperty('--user-color', userColor);

        // Reply snippet
        let replyHtml = '';
        if (data.replyTo) {
            const replyColor = stringToColor(data.replyTo.user.name);
            const targetId = data.replyTo.id || '';
            replyHtml = `
                <div class="reply-snippet" style="--reply-color: ${replyColor}" onclick="scrollToMessage('${targetId}')" title="Click to view original">
                    <span class="snippet-name" style="color:${replyColor}">↰ ${data.replyTo.user.name}</span>
                    <span class="snippet-text">${data.replyTo.text || '[Attachment]'}</span>
                </div>`;
        }

        // Media attachments
        let mediaHtml = '';
        if (data.files && data.files.length > 0) {
            mediaHtml = data.files.map(f => {
                if (f.type && f.type.startsWith('video/')) {
                    return `<video src="${f.data}" controls class="media-attachment" onclick="event.stopPropagation(); window.viewMedia('${f.data}', 'video')"></video>`;
                }
                return `<img src="${f.data}" class="media-attachment" onclick="window.viewMedia('${f.data}', 'image')" alt="attachment">`;
            }).join('');
        }

        div.innerHTML = `
            <div class="user-header">
                <img src="${data.user.avatarUrl || currentUser.avatarUrl}" class="chat-avatar" onerror="this.src='${currentUser.avatarUrl}'">
                <span class="username">${data.user.name}</span>
            </div>
            <div class="message">
                ${replyHtml}
                <div class="text-content"></div>
                ${mediaHtml}
            </div>
            <span class="timestamp" style="font-family:var(--font-ui); font-size:10px; color:var(--text-muted); margin-top:4px; opacity:0.6">${data.timestamp || ''}</span>
            <div class="reply-action-btn" onclick="initiateReply('${data.id}')" title="Reply to this">↰</div>
        `;
        
        container.appendChild(div);
        
        const textTarget = div.querySelector('.text-content');
        if (!isHistory && !isSelf && data.text) {
            scrambleText(textTarget, data.text);
        } else {
            textTarget.innerText = data.text || '';
        }

        // Auto-scroll if near bottom
        const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
        if (isNearBottom || isSelf) {
            container.scrollTop = container.scrollHeight;
        }
    }

    // Send message
    async function handleSend() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();

        // Commands
        if (text.startsWith('/')) {
            const [cmd, ...args] = text.slice(1).split(' ');
            switch(cmd.toLowerCase()) {
                case 'clear':
                    document.getElementById('chat-container').innerHTML = '';
                    input.value = '';
                    return;
                case 'logout':
                    logout();
                    return;
                case 'help':
                    showNotification('Commands: /clear, /logout, /help');
                    input.value = '';
                    return;
            }
        }

        if (!text && selectedFiles.length === 0) return;
        if (!isConnected) {
            showNotification('No active neural link', 'error');
            return;
        }

        try {
            const files = await Promise.all(selectedFiles.map(f => new Promise((res, rej) => {
                const r = new FileReader();
                r.onerror = rej;
                r.onload = e => res({type: f.type, name: f.name, data: e.target.result});
                r.readAsDataURL(f);
            })));

            const msgData = {
                id: Math.random().toString(36).substr(2, 9),
                user: currentUser,
                text,
                files,
                timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                replyTo: activeReplyTarget ? {
                    id: activeReplyTarget.id,
                    user: activeReplyTarget.user,
                    text: activeReplyTarget.text
                } : null
            };

            // Optimistic render
            renderMessage(msgData);
            socket.emit('chat message', msgData);

            input.value = '';
            selectedFiles = [];
            document.getElementById('file-preview-area').innerHTML = '';
            cancelReply();
        } catch (err) {
            showNotification('Transmission failed: ' + err.message, 'error');
        }
    }

    // Event listeners
    document.getElementById('send-btn').addEventListener('click', handleSend);
    
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });

    // Login handlers
    document.getElementById('join-btn').addEventListener('click', () => {
        const input = document.getElementById('username-input');
        const val = input.value.trim();
        const errorDiv = document.getElementById('login-error');
        
        if (!val || val.length < 2) {
            errorDiv.innerText = 'Callsign must be 2-20 characters';
            errorDiv.style.display = 'block';
            input.style.borderColor = 'var(--accent-magenta)';
            return;
        }
        
        if (!/^[a-zA-Z0-9_-]+$/.test(val)) {
            errorDiv.innerText = 'Alphanumeric, dash, underscore only';
            errorDiv.style.display = 'block';
            input.style.borderColor = 'var(--accent-magenta)';
            return;
        }
        
        errorDiv.style.display = 'none';
        input.style.borderColor = '';
        currentUser.name = val;
        currentUser.id = socket.id;
        localStorage.setItem('futureChatUser', JSON.stringify(currentUser));
        enterChat();
    });

    document.getElementById('username-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('join-btn').click();
    });

    document.getElementById('username-input').addEventListener('input', () => {
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('username-input').style.borderColor = '';
    });

    // Header controls
    document.getElementById('invite-btn').addEventListener('click', () => {
        navigator.clipboard.writeText(window.location.href).then(() => {
            showNotification('Uplink URL copied to buffer');
        }).catch(() => {
            showNotification('Manual copy required', 'error');
        });
    });

    document.getElementById('logout-btn').addEventListener('click', logout);

    // Typing indicator
    document.getElementById('chat-input').addEventListener('input', () => {
        if (!isConnected) return;
        socket.emit('typing', { isTyping: true, user: currentUser });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            socket.emit('typing', { isTyping: false, user: currentUser });
        }, 2000);
    });

    // Socket events
    socket.on('chat message', (data) => {
        // Don't re-render if we sent it (optimistic rendering)
        if (data.user.id !== socket.id) {
            renderMessage(data);
        }
    });

    socket.on('load history', (history) => {
        history.forEach(m => renderMessage(m, true));
    });

    socket.on('user count', (count) => {
        document.getElementById('count-number').innerText = count;
    });

    socket.on('user joined', (user) => {
        if (user.id !== socket.id) {
            showNotification(`${user.name} entered the backroom`);
        }
    });

    socket.on('user left', (user) => {
        showNotification(`${user.name} departed`, 'error');
    });

    socket.on('typing', (data) => {
        const indicator = document.getElementById('typing-indicator');
        const text = document.getElementById('typing-text');
        if (data.isTyping && data.user.id !== socket.id) {
            text.innerText = `${data.user.name} is transmitting...`;
            indicator.classList.add('active');
        } else {
            indicator.classList.remove('active');
        }
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
        if (isConnected) {
            socket.emit('typing', { isTyping: false, user: currentUser });
        }
    });
</script>
</body>
</html>
