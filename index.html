<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-color: #000000;
            --glass-bg: rgba(28, 28, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #0a84ff;
            --bubble-other: #2c2c2e;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1a24 0%, #000000 70%);
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* --- Notifications --- */
        #notification-container { position: fixed; top: 20px; right: 50%; transform: translateX(50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .system-notification { background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); color: var(--text-main); padding: 12px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .system-notification.fade-out { animation: fadeOutUp 0.4s ease forwards; }
        @keyframes slideDown { 0% { transform: translateY(-20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOutUp { 100% { transform: translateY(-20px); opacity: 0; } }

        /* --- Login Screen --- */
        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); }
        .login-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 40px; border-radius: 24px; width: 100%; max-width: 360px; text-align: center; display: flex; flex-direction: column; gap: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .login-title { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
        .avatar-upload-wrapper { position: relative; width: 88px; height: 88px; margin: 0 auto; background: #1c1c1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; color: var(--text-muted); font-size: 12px; font-weight: 500; transition: transform 0.2s ease;}
        .avatar-upload-wrapper:hover { transform: scale(1.05); }
        #avatar-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        #avatar-input { display: none; }
        .login-input { width: 100%; background: #1c1c1e; border: 1px solid var(--glass-border); color: var(--text-main); padding: 16px; font-size: 15px; border-radius: 12px; outline: none; transition: border-color 0.2s ease; }
        .login-input:focus { border-color: var(--accent-blue); }

        /* --- App Container & Breakpoints --- */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 1200px; margin: 0 auto; position: relative; background: transparent; }
        @media (min-width: 768px) {
            #app-container { height: 95vh; margin-top: 2.5vh; border-radius: 24px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: 0 24px 48px rgba(0,0,0,0.4); overflow: hidden;}
        }

        /* --- App Header --- */
        #app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--glass-border); background: rgba(28, 28, 30, 0.4); z-index: 10; backdrop-filter: blur(10px); }
        .header-title { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px;}
        .header-controls { display: flex; align-items: center; gap: 12px; }

        .pulse-dot { width: 6px; height: 6px; background: #32d74b; border-radius: 50%; box-shadow: 0 0 8px rgba(50, 215, 75, 0.4); }
        #user-count-badge { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; font-weight: 500;}

        .btn { background: var(--accent-blue); color: #fff; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background-color 0.2s ease, transform 0.1s ease; }
        .btn:hover { background: #0071e3; }
        .btn:active { transform: scale(0.96); }
        .btn-secondary { background: #2c2c2e; color: var(--text-main); }
        .btn-secondary:hover { background: #3a3a3c; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Chat Messages --- */
        #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .message-wrapper { display: flex; flex-direction: column; max-width: 75%; animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .message-wrapper.other { align-self: flex-start; }
        .message-wrapper.self { align-self: flex-end; align-items: flex-end; }
        
        @keyframes popIn { 0% { opacity: 0; transform: translateY(10px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        
        .user-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; padding: 0 4px; }
        .self .user-header { flex-direction: row-reverse; }
        .chat-avatar { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; }
        .username { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        
        .message { padding: 12px 16px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .other .message { background: var(--bubble-other); color: var(--text-main); border-radius: 18px 18px 18px 4px; }
        .self .message { background: var(--accent-blue); color: #fff; border-radius: 18px 18px 4px 18px; }
        
        .timestamp { font-size: 10px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }
        
        .media-attachment { max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid var(--glass-border); }

        /* --- Typing Indicator --- */
        #typing-indicator { display: none; padding: 0 24px 12px; color: var(--text-muted); font-size: 13px; font-weight: 500; }
        .typing-dots { display: inline-flex; gap: 3px; align-items: center; margin-left: 4px;}
        .typing-dots span { width: 4px; height: 4px; background: var(--text-muted); border-radius: 50%; animation: typeBounce 1.4s infinite ease-in-out both; }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typeBounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* --- Input Area --- */
        #input-area { padding: 16px 24px; background: rgba(28, 28, 30, 0.4); border-top: 1px solid var(--glass-border); display: flex; gap: 12px; align-items: flex-end; backdrop-filter: blur(10px); }
        .attach-btn { width: 40px; height: 40px; border-radius: 50%; background: #2c2c2e; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-size: 18px; transition: background 0.2s; flex-shrink: 0; margin-bottom: 2px;}
        .attach-btn:hover { background: #3a3a3c; }

        #input-wrapper { flex: 1; background: #1c1c1e; border: 1px solid var(--glass-border); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; transition: border-color 0.2s; }
        #input-wrapper:focus-within { border-color: #3a3a3c; }
        #chat-input { width: 100%; background: transparent; border: none; color: var(--text-main); padding: 12px 16px; font-size: 15px; outline: none; resize: none; min-height: 44px; max-height: 120px; font-family: inherit; line-height: 1.4; }
        
        #file-preview-area { display: flex; gap: 8px; padding: 0; overflow-x: auto;}
        #file-preview-area:not(:empty) { padding: 12px 16px 0; }
        .file-preview-item { width: 48px; height: 48px; border-radius: 8px; overflow: hidden; border: 1px solid var(--glass-border); }
        .file-preview-item img { width: 100%; height: 100%; object-fit: cover; }

        .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-blue); display: flex; align-items: center; justify-content: center; border: none; color: white; cursor: pointer; flex-shrink: 0; transition: transform 0.1s; margin-bottom: 2px;}
        .send-btn:hover { background: #0071e3; }
        .send-btn:active { transform: scale(0.92); }
        .send-btn:disabled { background: #2c2c2e; color: var(--text-muted); }
        
        .send-icon { width: 18px; height: 18px; fill: currentColor; transform: translateY(-1px) translateX(1px); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a4c; }
    </style>
</head>
<body>

<div id="notification-container"></div>

<div id="login-screen">
    <div class="login-card">
        <div class="login-title">Join Chat</div>
        <label for="avatar-input" class="avatar-upload-wrapper">
            <span id="upload-icon">Add Photo</span>
            <img id="avatar-preview" src="" alt="Avatar Preview">
        </label>
        <input type="file" id="avatar-input" accept="image/*">
        <input type="text" id="username-input" class="login-input" placeholder="Your name" autocomplete="off">
        <button class="btn" id="join-btn">Continue</button>
    </div>
</div>

<div id="app-container">
    <div id="app-header">
        <div class="header-title">
            Private Room
        </div>
        
        <div class="header-controls">
            <div id="user-count-badge">
                <div class="pulse-dot"></div>
                <span id="count-number">0</span> Online
            </div>
            <button id="invite-btn" class="btn btn-secondary">Share</button>
            <button id="disconnect-btn" class="btn btn-secondary" style="color: #ff453a;">Leave</button>
        </div>
    </div>

    <div id="chat-container"></div>
    
    <div id="typing-indicator">
        <span id="typing-name">Someone</span> is typing
        <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
    
    <div id="input-area">
        <label for="file-input" class="attach-btn">+</label>
        <input type="file" id="file-input" multiple style="display:none">
        
        <div id="input-wrapper">
            <div id="file-preview-area"></div>
            <textarea id="chat-input" placeholder="Message..." rows="1"></textarea>
        </div>
        
        <button class="send-btn" id="send-btn">
            <svg class="send-icon" viewBox="0 0 24 24">
                <path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.06-.87.49-.87.99l.01 4.61c0 .71.73 1.2 1.39.92z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    const socket = io(); 
    let isConnected = true;

    // --- Soft Chime Synthesizer ---
    function playChime() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        } catch (e) { console.log("Web Audio API not supported."); }
    }

    // --- System Notifications ---
    function showNotification(text) {
        const container = document.getElementById('notification-container');
        const note = document.createElement('div');
        note.className = `system-notification`;
        note.innerHTML = text;
        container.appendChild(note);
        setTimeout(() => {
            note.classList.add('fade-out');
            setTimeout(() => note.remove(), 400);
        }, 3000);
    }

    // --- Connection Resilience ---
    socket.on('disconnect', () => {
        isConnected = false;
        showNotification("Connecting...");
        document.getElementById('chat-input').disabled = true;
        document.getElementById('send-btn').disabled = true;
    });

    socket.on('connect', () => {
        if (!isConnected) {
            isConnected = true;
            showNotification("Connected");
            document.getElementById('chat-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
        }
    });

    socket.on('user count', (count) => {
        document.getElementById('count-number').textContent = count;
    });

    // --- Identity Logic ---
    let currentUser = { name: 'User', avatarUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2386868b"><circle cx="12" cy="8" r="4"/><path d="M12 14c-4 0-7 2-7 6v1h14v-1c0-4-3-6-7-6z"/></svg>' };

    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('appleChatUser');
        if (saved) {
            currentUser = JSON.parse(saved);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        }
    });

    document.getElementById('join-btn').onclick = () => {
        const val = document.getElementById('username-input').value.trim();
        if (val) {
            currentUser.name = val;
            localStorage.setItem('appleChatUser', JSON.stringify(currentUser));
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        }
    };

    document.getElementById('disconnect-btn').onclick = () => {
        localStorage.removeItem('appleChatUser');
        location.reload();
    };

    document.getElementById('avatar-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentUser.avatarUrl = ev.target.result;
            document.getElementById('avatar-preview').src = ev.target.result;
            document.getElementById('avatar-preview').style.display = 'block';
            document.getElementById('upload-icon').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- Messaging ---
    function parseMarkdown(text) {
        let html = text.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        const imgRegex = /(https?:\/\/[^\s]+?\.(?:gif|png|jpg|jpeg|webp))/gi;
        return html.replace(imgRegex, (m) => `<img src="${m}" class="media-attachment">`);
    }

    function renderMessage(data, isHistoryLoad = false) {
        const container = document.getElementById('chat-container');
        const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;
        const isSelf = data.user.name === currentUser.name;

        const div = document.createElement('div');
        div.className = `message-wrapper ${isSelf ? 'self' : 'other'}`;
        
        let headerHtml = '';
        if (!isSelf) {
            headerHtml = `
                <div class="user-header">
                    <img src="${data.user.avatarUrl}" class="chat-avatar">
                    <span class="username">${data.user.name}</span>
                </div>
            `;
        }

        let mediaHtml = '';
        if (data.files) {
            data.files.forEach(f => {
                const tag = f.type.startsWith('image/') ? 'img' : 'video';
                const controls = f.type.startsWith('video/') ? 'controls' : '';
                mediaHtml += `<${tag} src="${f.data}" class="media-attachment" ${controls}></${tag}>`;
            });
        }

        div.innerHTML = `
            ${headerHtml}
            <div class="message">
                ${parseMarkdown(data.text)}
                ${mediaHtml}
            </div>
            <span class="timestamp">${data.timestamp}</span>
        `;
        
        container.appendChild(div);

        if (!isHistoryLoad && !isSelf) {
            playChime();
        }

        setTimeout(() => {
            if (isAtBottom || isSelf) {
                container.scrollTop = container.scrollHeight;
            }
        }, 0);
    }

    socket.on('chat message', (data) => renderMessage(data, false));
    socket.on('load history', (history) => history.forEach(msg => renderMessage(msg, true)));

    // --- Typing Logic ---
    let typingTimeout;
    const typingIndicator = document.getElementById('typing-indicator');
    const typingName = document.getElementById('typing-name');

    document.getElementById('chat-input').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        
        socket.emit('typing', currentUser.name);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit('stop typing'), 1500);
    });

    socket.on('typing', (name) => {
        typingName.textContent = name;
        typingIndicator.style.display = 'block';
        const container = document.getElementById('chat-container');
        container.scrollTop = container.scrollHeight;
    });

    socket.on('stop typing', () => {
        typingIndicator.style.display = 'none';
    });

    // --- File Handling ---
    let selectedFiles = [];
    document.getElementById('file-input').onchange = (e) => {
        selectedFiles = Array.from(e.target.files);
        const area = document.getElementById('file-preview-area');
        area.innerHTML = '';
        selectedFiles.forEach(f => {
            const item = document.createElement('div'); item.className = 'file-preview-item';
            const img = document.createElement('img'); img.src = URL.createObjectURL(f);
            item.appendChild(img); area.appendChild(item);
        });
    };

    async function handleSend() {
        if (!isConnected) return;
        
        const input = document.getElementById('chat-input');
        const text = input.value;
        if (!text.trim() && selectedFiles.length === 0) return;
        
        const filePromises = selectedFiles.map(file => new Promise(res => {
            const r = new FileReader(); r.onload = (e) => res({ type: file.type, data: e.target.result }); r.readAsDataURL(file);
        }));
        
        const files = await Promise.all(filePromises);
        socket.emit('chat message', {
            user: currentUser, text, files, timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('file-preview-area').innerHTML = ''; 
        selectedFiles = [];
        socket.emit('stop typing');
    }

    document.getElementById('send-btn').onclick = handleSend;
    document.getElementById('chat-input').onkeydown = (e) => { 
        if(e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            handleSend(); 
        } 
    };

    document.getElementById('invite-btn').onclick = () => {
        navigator.clipboard.writeText(window.location.href);
        showNotification("Link copied");
    };
</script>
</body>
</html>
