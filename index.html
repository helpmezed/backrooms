<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backroom Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #030712;
            --glass-bg: rgba(10, 15, 30, 0.7);
            --glass-border: rgba(0, 238, 255, 0.2);
            --accent-cyan: #00eeff;
            --accent-magenta: #ff00ea;
            --bubble-other: rgba(20, 25, 40, 0.8);
            --bubble-self: rgba(0, 238, 255, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --font-ui: 'Orbitron', sans-serif;
            --font-text: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--font-text); background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased;
            background-image: linear-gradient(rgba(0, 238, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 238, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- CRT Scanline Overlay --- */
        body::before {
            content: " "; position: fixed; inset: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        #notification-container { position: fixed; top: 20px; right: 50%; transform: translateX(50%); z-index: 1001; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .system-notification { background: rgba(3, 7, 18, 0.9); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 12px 20px; border-radius: 4px; font-family: var(--font-ui); font-size: 11px; text-transform: uppercase; animation: slideDown 0.4s forwards; box-shadow: 0 0 15px rgba(0, 238, 255, 0.2); }
        .system-notification.error { border-color: var(--accent-magenta); color: var(--accent-magenta); box-shadow: 0 0 15px rgba(255, 0, 234, 0.2); }
        @keyframes slideDown { 0% { transform: translateY(-20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        /* --- Connection Status --- */
        .conn-status { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-magenta); display: inline-block; margin-right: 8px; box-shadow: 0 0 8px var(--accent-magenta); transition: all 0.3s; }
        .conn-status.online { background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* --- Main Layout --- */
        #app-container { display: none; flex-direction: row; height: 100vh; width: 100%; max-width: 1400px; margin: 0 auto; position: relative; }
        @media (min-width: 768px) { #app-container { height: 95vh; margin-top: 2.5vh; border-radius: 8px; background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); overflow: hidden; } }

        #chat-main { flex: 1; display: flex; flex-direction: column; position: relative; border-right: 1px solid var(--glass-border); }
        #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }

        /* --- Entity Sidebar --- */
        #sidebar { width: 240px; background: rgba(3, 7, 18, 0.4); display: flex; flex-direction: column; padding: 20px; gap: 15px; overflow-y: auto; }
        .sidebar-title { font-family: var(--font-ui); font-size: 12px; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .user-list-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); padding: 8px; border-radius: 4px; transition: all 0.2s; }
        .user-list-item:hover { background: rgba(0, 238, 255, 0.05); color: var(--text-main); }
        .user-list-item .user-avatar { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; border: 1px solid var(--glass-border); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; flex-shrink: 0; }

        /* --- Messages --- */
        .message-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: springIn 0.5s forwards; margin-bottom: 10px; position: relative; }
        .message-wrapper.self { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.other { align-self: flex-start; }
        @keyframes springIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        .user-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-family: var(--font-ui); font-size: 11px; }
        .self .user-header { display: flex; justify-content: flex-end; }
        .self .username { display: none; }
        .username { color: var(--user-color, var(--text-muted)); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .timestamp { margin-left: auto; font-size: 10px; color: var(--text-muted); font-family: var(--font-ui); padding-left: 12px; white-space: nowrap; }

        .message { padding: 14px 18px; border-radius: 4px; backdrop-filter: blur(5px); border: 1px solid var(--glass-border); position: relative; font-size: 15px; line-height: 1.5; word-wrap: break-word; max-width: 100%; }
        .other .message { border-left: 3px solid var(--user-color, var(--accent-cyan)); background: var(--bubble-other); color: var(--text-main); }
        .self .message { border-right: 3px solid var(--accent-cyan); background: var(--bubble-self); color: var(--accent-cyan); }

        /* Tactical Alert */
        .message-wrapper .message.tactical-alert { 
            background: rgba(255, 0, 234, 0.15) !important; 
            border: 1px solid var(--accent-magenta) !important; 
            border-left: 3px solid var(--accent-magenta) !important;
            color: var(--accent-magenta) !important;
            animation: alertPulse 1.5s infinite alternate; 
            font-weight: 700;
        }
        @keyframes alertPulse { from { box-shadow: 0 0 5px rgba(255, 0, 234, 0.3); } to { box-shadow: 0 0 25px rgba(255, 0, 234, 0.6); } }

        .media-attachment { max-width: 100%; border-radius: 4px; margin-top: 10px; display: block; border: 1px solid var(--glass-border); cursor: pointer; }

        /* --- Input Area --- */
        #input-area { padding: 16px 24px; background: rgba(3, 7, 18, 0.8); border-top: 1px solid var(--glass-border); display: flex; gap: 12px; align-items: flex-end; }
        #input-wrapper { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
        #chat-input { width: 100%; background: transparent; border: none; color: #fff; padding: 14px 18px; outline: none; resize: none; min-height: 48px; font-family: var(--font-text); font-size: 15px; }

        .btn { font-family: var(--font-ui); background: rgba(0, 238, 255, 0.1); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 8px 16px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }

        #file-preview-area { display: flex; gap: 8px; padding: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--glass-border); }
        .file-preview-item { display: flex; align-items: center; gap: 6px; background: rgba(0, 238, 255, 0.05); border: 1px solid var(--glass-border); padding: 4px 8px; border-radius: 4px; font-size: 11px; color: var(--text-muted); }

        #typing-indicator { display: none; padding: 8px 24px; font-family: var(--font-ui); font-size: 10px; color: var(--accent-cyan); letter-spacing: 2px; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); }
        #typing-indicator.active { display: block; }

        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: var(--bg-color); backdrop-filter: blur(10px); }
        .login-card { text-align: center; background: var(--glass-bg); padding: 40px; border-radius: 8px; border: 1px solid var(--glass-border); max-width: 360px; width: 90%; }
        .login-input { padding: 14px; margin-bottom: 20px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white; border-radius: 4px; width: 100%; }

        /* --- Mobile sidebar toggle --- */
        #sidebar-toggle { display: none; background: none; border: 1px solid var(--glass-border); color: var(--accent-cyan); font-size: 18px; line-height: 1; cursor: pointer; padding: 4px 10px; border-radius: 4px; }
        @media (max-width: 767px) {
            #sidebar-toggle { display: block; }
            #sidebar { position: fixed; right: 0; top: 0; bottom: 0; z-index: 500; transform: translateX(100%); transition: transform 0.3s; }
            #sidebar.open { transform: translateX(0); box-shadow: -10px 0 40px rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>

<div id="notification-container"></div>

<div id="login-screen">
    <div class="login-card">
        <h2 style="font-family:var(--font-ui); color:var(--accent-cyan); margin-bottom:24px;">Initialize Link</h2>
        <div id="login-error" style="color:var(--accent-magenta); display:none; margin-bottom:10px;">Invalid callsign</div>
        <input type="text" id="username-input" class="login-input" placeholder="Enter Callsign" maxlength="20">
        <button class="btn" id="join-btn" style="width:100%">Engage</button>
    </div>
</div>

<div id="app-container">
    <div id="chat-main">
        <header id="app-header" style="padding:16px 24px; border-bottom:1px solid var(--glass-border); font-family:var(--font-ui); color:var(--accent-cyan); display:flex; align-items:center; justify-content:space-between;">
            <div><span class="conn-status" id="conn-dot"></span> BACKROOM TERMINAL</div>
            <div style="display:flex;align-items:center;gap:12px;">
                <span id="connection-text" style="font-size:11px;">OFFLINE</span>
                <button id="sidebar-toggle">&#9776;</button>
            </div>
        </header>
        
        <div id="chat-container"></div>
        
        <div id="typing-indicator">
            <span id="typing-text">Unknown entity transmitting...</span>
        </div>
        
        <div id="input-area">
            <label for="file-input" class="btn" style="padding:12px">+</label>
            <input type="file" id="file-input" multiple accept="image/*,video/*" style="display:none">
            <div id="input-wrapper">
                <div id="file-preview-area" style="display:none;"></div>
                <textarea id="chat-input" placeholder="Input sequence... (/alert for tactical)" rows="1"></textarea>
            </div>
            <button class="btn" id="send-btn" style="height:48px;">Transmit</button>
        </div>
    </div>
    
    <aside id="sidebar">
        <div class="sidebar-title">Entities Online <span id="online-count">0</span></div>
        <div id="user-list"></div>
    </aside>
</div>

<script>
    const socket = io();
    let currentUser = { name: 'User', id: null };
    let selectedFiles = [];
    let isConnected = false;
    let typingTimeout = null;
    const typingUsers = new Map(); // socketId -> name

    // Sanitize user-provided strings before inserting into the DOM
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function showNotification(text, type = 'info') {
        const container = document.getElementById('notification-container');
        const n = document.createElement('div');
        n.className = `system-notification${type === 'error' ? ' error' : ''}`;
        n.textContent = text;
        container.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    socket.on('connect', () => {
        isConnected = true;
        currentUser.id = socket.id;
        document.getElementById('conn-dot').classList.add('online');
        document.getElementById('connection-text').innerText = 'ONLINE';
        // Re-join on connect/reconnect if the user already has a callsign
        if (currentUser.name !== 'User') socket.emit('user joined', currentUser);
    });

    socket.on('disconnect', () => {
        isConnected = false;
        document.getElementById('conn-dot').classList.remove('online');
        document.getElementById('connection-text').innerText = 'OFFLINE';
    });

    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('futureChatUser');
        if (saved) {
            try {
                currentUser = { ...currentUser, ...JSON.parse(saved) };
                enterChat();
            } catch (e) { localStorage.removeItem('futureChatUser'); }
        }
    });

    function enterChat() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        // Emit if already connected (handles localStorage restore after socket is up)
        if (isConnected) socket.emit('user joined', currentUser);
    }

    async function processFile(file) {
        if (!file.type.startsWith('image/') || file.type === 'image/gif') return file;
        return new Promise((resolve) => {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1280;
                let width = img.width, height = img.height;
                if (width > MAX_WIDTH) { height = Math.round(height * MAX_WIDTH / width); width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                canvas.toBlob((blob) => resolve(new File([blob], file.name, { type: 'image/jpeg' })), 'image/jpeg', 0.8);
            };
        });
    }

    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        return `hsl(${Math.abs(hash) % 360}, 100%, 65%)`;
    }

    function renderMessage(data) {
        const container = document.getElementById('chat-container');
        const isSelf = data.user.id === socket.id;
        const userColor = stringToColor(data.user.name);

        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${isSelf ? 'self' : 'other'}`;
        wrapper.style.setProperty('--user-color', userColor);

        // Header: username + timestamp
        const header = document.createElement('div');
        header.className = 'user-header';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'username';
        nameSpan.style.color = userColor;
        nameSpan.textContent = data.user.name; // textContent, not innerHTML
        const tsSpan = document.createElement('span');
        tsSpan.className = 'timestamp';
        tsSpan.textContent = data.timestamp || '';
        header.appendChild(nameSpan);
        header.appendChild(tsSpan);

        // Message bubble
        const bubble = document.createElement('div');
        bubble.className = `message${data.isAlert ? ' tactical-alert' : ''}`;
        if (data.text) bubble.appendChild(document.createTextNode(data.text));

        // Media attachments
        if (data.files?.length) {
            data.files.forEach(f => {
                let media;
                if (f.type?.startsWith('video/')) {
                    media = document.createElement('video');
                    media.src = f.data;
                    media.controls = true;
                } else {
                    media = document.createElement('img');
                    media.src = f.data;
                    media.addEventListener('click', () => openLightbox(f.data));
                }
                media.className = 'media-attachment';
                bubble.appendChild(media);
            });
        }

        wrapper.appendChild(header);
        wrapper.appendChild(bubble);
        container.appendChild(wrapper);
        container.scrollTop = container.scrollHeight;
    }

    function openLightbox(src) {
        const lb = document.createElement('div');
        lb.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out';
        const img = document.createElement('img');
        img.src = src;
        img.style.cssText = 'max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px;border:1px solid rgba(0,238,255,0.2)';
        lb.appendChild(img);
        lb.addEventListener('click', () => lb.remove());
        document.body.appendChild(lb);
    }

    async function handleSend() {
        const input = document.getElementById('chat-input');
        let text = input.value.trim();
        let isAlert = false;

        if (text.startsWith('/alert ')) { text = text.slice(7); isAlert = true; }
        if (!text && selectedFiles.length === 0) return;

        // Stop typing indicator
        clearTimeout(typingTimeout);
        socket.emit('typing stop');

        const processedFiles = await Promise.all(selectedFiles.map(async f => {
            const processed = await processFile(f);
            return new Promise(res => {
                const r = new FileReader();
                r.onload = e => res({ type: processed.type, data: e.target.result });
                r.readAsDataURL(processed);
            });
        }));

        const msgData = {
            id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2),
            user: currentUser,
            text,
            files: processedFiles,
            isAlert,
            timestamp: new Date().toLocaleTimeString()
        };

        renderMessage(msgData);
        socket.emit('chat message', msgData);
        input.value = '';
        selectedFiles = [];
        document.getElementById('file-preview-area').style.display = 'none';
        autoResize(input);
    }

    // --- Typing indicator ---
    function updateTypingIndicator() {
        const el = document.getElementById('typing-indicator');
        const textEl = document.getElementById('typing-text');
        const names = Array.from(typingUsers.values());
        if (names.length === 0) {
            el.classList.remove('active');
        } else {
            const label = names.length === 1
                ? `${escapeHtml(names[0])} is transmitting...`
                : `${names.slice(0, -1).map(escapeHtml).join(', ')} & ${escapeHtml(names.at(-1))} are transmitting...`;
            textEl.textContent = label;
            el.classList.add('active');
        }
    }

    // --- Auto-resize textarea ---
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // --- Login ---
    function doJoin() {
        const val = document.getElementById('username-input').value.trim();
        if (!val) { document.getElementById('login-error').style.display = 'block'; return; }
        currentUser.name = val;
        currentUser.id = socket.id;
        localStorage.setItem('futureChatUser', JSON.stringify(currentUser));
        enterChat();
    }

    document.getElementById('join-btn').addEventListener('click', doJoin);
    document.getElementById('username-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') doJoin(); });

    // --- Chat input ---
    document.getElementById('send-btn').addEventListener('click', handleSend);
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    document.getElementById('chat-input').addEventListener('input', (e) => {
        autoResize(e.target);
        socket.emit('typing');
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit('typing stop'), 2000);
    });

    // --- File picker ---
    document.getElementById('file-input').addEventListener('change', (e) => {
        selectedFiles = Array.from(e.target.files);
        const area = document.getElementById('file-preview-area');
        area.style.display = 'flex';
        area.innerHTML = '';
        selectedFiles.forEach(f => {
            const item = document.createElement('div');
            item.className = 'file-preview-item';
            item.textContent = f.name;
            area.appendChild(item);
        });
    });

    // --- Mobile sidebar toggle ---
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });

    // --- Socket events ---
    socket.on('chat message', (data) => { if (data.user.id !== socket.id) renderMessage(data); });
    socket.on('load history', (h) => h.forEach(renderMessage));

    socket.on('typing', (data) => {
        typingUsers.set(data.id, data.name);
        updateTypingIndicator();
    });
    socket.on('typing stop', (data) => {
        typingUsers.delete(data.id);
        updateTypingIndicator();
    });

    socket.on('user list', (users) => {
        document.getElementById('online-count').textContent = users.length;
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        users.forEach(u => {
            const item = document.createElement('div');
            item.className = 'user-list-item';
            const dot = document.createElement('div');
            dot.className = 'status-dot';
            const name = document.createElement('span');
            name.style.color = stringToColor(u.name);
            name.textContent = u.name; // textContent, not innerHTML
            item.appendChild(dot);
            item.appendChild(name);
            list.appendChild(item);
        });
    });
</script>
</body>
</html>
