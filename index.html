<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms Private Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Saira+Stencil+One&display=swap" rel="stylesheet">
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --backrooms-bg: #d4c593;
            --backrooms-dark: #8a7b4f;
            --vhs-text: #f0e6d2;
            --sys-accent: #ff4a4a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--backrooms-bg);
            color: #2a2515; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
        }

        .stencil-font { font-family: 'Saira Stencil One', cursive; font-weight: normal; }

        /* --- Liminal Background & VHS CRT Effects --- */
        #liminal-bg {
            position: fixed; inset: 0; z-index: -2;
            background: radial-gradient(circle at 50% 50%, var(--backrooms-bg) 0%, var(--backrooms-dark) 100%);
        }
        
        #liminal-bg::after {
            content: ""; position: absolute; inset: 0; opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .crt-overlay {
            position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            animation: flicker 0.15s infinite;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 0.85; }
            100% { opacity: 0.95; }
        }

        /* --- Notifications --- */
        #notification-container { position: fixed; top: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .system-notification { background: rgba(0, 0, 0, 0.85); border: 1px solid var(--sys-accent); border-left: 4px solid var(--sys-accent); color: var(--vhs-text); padding: 14px 24px; border-radius: 2px; font-size: 14px; letter-spacing: 1px; display: flex; align-items: center; gap: 12px; animation: hudSlideIn 0.4s ease forwards; text-transform: uppercase; font-family: 'Saira Stencil One', cursive; }
        .system-notification.success { border-color: #228b22; border-left-color: #228b22; }
        .system-notification.warning { border-color: #da8a00; border-left-color: #da8a00; }
        .system-notification.fade-out { animation: hudFadeOut 0.5s forwards; }
        @keyframes hudSlideIn { 0% { transform: translateX(120%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes hudFadeOut { 100% { transform: translateX(120%); opacity: 0; } }

        /* --- Login Screen --- */
        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; background: rgba(212, 197, 147, 0.9); backdrop-filter: blur(5px); }
        .login-card { background: rgba(0, 0, 0, 0.85); border: 2px solid #333; padding: 40px; border-radius: 4px; width: 100%; max-width: 400px; text-align: center; display: flex; flex-direction: column; gap: 20px; box-shadow: 10px 10px 0px rgba(0,0,0,0.3); }
        .login-title { font-size: 28px; color: var(--vhs-text); letter-spacing: 2px; text-transform: uppercase; }
        .avatar-upload-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto; background: #222; border: 2px dashed #555; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; color: #777;}
        #avatar-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        #avatar-input { display: none; }
        .login-input { width: 100%; background: #111; border: 1px solid #444; color: var(--vhs-text); padding: 16px; font-size: 16px; outline: none; font-family: monospace; }
        .login-input:focus { border-color: var(--vhs-text); }

        /* --- App Container & Responsive Breakpoints --- */
        #app-container { display: none; flex-direction: column; height: 100%; width: 55%; margin: 0 auto; position: relative; background: rgba(0, 0, 0, 0.7); border-left: 2px solid #222; border-right: 2px solid #222; box-shadow: 0 0 50px rgba(0, 0, 0, 0.8); backdrop-filter: blur(3px); }
        
        @media (max-width: 900px) { 
            #app-container { width: 85%; } 
        }
        @media (max-width: 600px) { 
            #app-container { width: 100%; border: none; } 
            .header-title span { display: none; } /* Hide "PRIVATE CHAT" on mobile to save space */
            #chat-container { padding: 12px; }
            #input-area { padding: 12px; }
            .message { max-width: 95%; }
        }

        /* --- App Header --- */
        #app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 2px solid #222; background: #0a0a0a; z-index: 10; }
        .header-title { font-size: 18px; color: var(--vhs-text); letter-spacing: 1px; }
        .header-controls { display: flex; align-items: center; gap: 10px; }

        #user-count-badge { background: #1a1a1a; border: 1px solid #333; padding: 6px 12px; font-size: 11px; color: #888; display: flex; align-items: center; gap: 6px; }
        .pulse-dot { width: 8px; height: 8px; background: #da8a00; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .btn { background: #222; color: var(--vhs-text); border: 1px solid #444; padding: 8px 16px; cursor: pointer; font-size: 14px; text-transform: uppercase; transition: all 0.2s; }
        .btn:hover { background: #333; border-color: #666; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Chat Messages --- */
        #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        
        .message { position: relative; padding: 14px 18px; background: rgba(20, 20, 20, 0.9); border: 1px solid #333; border-left: 4px solid var(--backrooms-dark); max-width: 85%; animation: vhsPop 0.3s ease-out forwards; color: #ddd; }
        @keyframes vhsPop { 0% { opacity: 0; transform: translateY(5px); filter: contrast(200%) grayscale(100%); } 100% { opacity: 1; transform: translateY(0); filter: none; } }
        
        .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; border-bottom: 1px dashed #333; padding-bottom: 6px; }
        .chat-avatar { width: 20px; height: 20px; filter: grayscale(50%) contrast(120%); }
        .username { font-size: 13px; color: var(--backrooms-bg); letter-spacing: 1px; }
        .timestamp { margin-left: auto; font-size: 10px; color: #666; font-family: monospace; }
        .media-attachment { max-width: 100%; border-radius: 2px; margin-top: 10px; border: 1px solid #444; filter: sepia(30%) contrast(110%); }

        /* --- Typing Indicator --- */
        #typing-indicator { display: none; padding: 0 24px 10px; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; animation: pulseText 1s infinite; }
        @keyframes pulseText { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* --- Input Area --- */
        #input-area { padding: 20px 24px; background: #0a0a0a; border-top: 2px solid #222; display: flex; gap: 10px; align-items: flex-end; }
        #input-wrapper { flex: 1; background: #111; border: 1px solid #333; display: flex; flex-direction: column; }
        #chat-input { width: 100%; background: transparent; border: none; color: var(--vhs-text); padding: 14px; font-size: 15px; outline: none; resize: none; min-height: 50px; font-family: monospace; }
        
        #file-preview-area { display: flex; gap: 10px; padding: 0; }
        #file-preview-area:not(:empty) { padding: 10px; border-bottom: 1px solid #333; }
        .file-preview-item { width: 40px; height: 40px; border: 1px solid #666; overflow: hidden; }
        .file-preview-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); }
    </style>
</head>
<body>

<div id="liminal-bg"></div>
<div class="crt-overlay"></div>
<div id="notification-container"></div>

<div id="login-screen">
    <div class="login-card">
        <h1 class="login-title stencil-font">NoClip Comm</h1>
        <label for="avatar-input" class="avatar-upload-wrapper">
            <span id="upload-icon">ID PHOTO</span>
            <img id="avatar-preview" src="" alt="Avatar Preview">
        </label>
        <input type="file" id="avatar-input" accept="image/*">
        <input type="text" id="username-input" class="login-input" placeholder="ENTER_CALLSIGN" autocomplete="off">
        <button class="btn stencil-font" id="join-btn">INITIALIZE</button>
    </div>
</div>

<div id="app-container">
    <div id="app-header">
        <div class="header-title stencil-font">NOCLIP <span>// LEVEL 0</span></div>
        
        <div class="header-controls">
            <div id="user-count-badge" class="stencil-font">
                <div class="pulse-dot"></div>
                <div style="margin-top: 2px;">ENTITIES: <span id="count-number">0</span></div>
            </div>
            <button id="invite-btn" class="btn stencil-font">COPY URL</button>
            <button id="disconnect-btn" class="btn stencil-font" style="color: var(--sys-accent); border-color: #552222;">ABORT</button>
        </div>
    </div>

    <div id="chat-container"></div>
    
    <div id="typing-indicator" class="stencil-font">DATA INCOMING...</div>
    
    <div id="input-area">
        <label for="file-input" style="cursor:pointer; padding:13px; background:#1a1a1a; border:1px solid #333; color:#888;">ATTACH</label>
        <input type="file" id="file-input" multiple style="display:none">
        
        <div id="input-wrapper">
            <div id="file-preview-area"></div>
            <textarea id="chat-input" placeholder="TRANSMIT_DATA..." rows="1"></textarea>
        </div>
        
        <button class="btn stencil-font" id="send-btn" style="height: 50px;">SEND</button>
    </div>
</div>

<script>
    const socket = io(); 
    let isConnected = true;

    // --- Low-Fi Analog Audio Synthesizer ---
    function playAnalogBlip() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // Creates a dull, electrical thump sound
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(120, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        } catch (e) { console.log("Web Audio API not supported on this browser."); }
    }

    // --- System Notifications ---
    function showNotification(text, type = '') {
        const container = document.getElementById('notification-container');
        const note = document.createElement('div');
        note.className = `system-notification ${type}`;
        note.innerHTML = `<span>[SYS]</span> ${text}`;
        container.appendChild(note);
        setTimeout(() => {
            note.classList.add('fade-out');
            setTimeout(() => note.remove(), 500);
        }, 3000);
    }

    // --- Connection Resilience ---
    socket.on('disconnect', () => {
        isConnected = false;
        showNotification("SIGNAL LOST. ATTEMPTING RECONNECT...", "warning");
        document.getElementById('chat-input').disabled = true;
        document.getElementById('send-btn').disabled = true;
        document.getElementById('chat-input').placeholder = "OFFLINE...";
    });

    socket.on('connect', () => {
        if (!isConnected) {
            isConnected = true;
            showNotification("SIGNAL RESTORED", "success");
            document.getElementById('chat-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('chat-input').placeholder = "TRANSMIT_DATA...";
        }
    });

    socket.on('user count', (count) => {
        document.getElementById('count-number').textContent = count;
    });

    // --- Identity Logic ---
    let currentUser = { name: 'Wanderer', avatarUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23888"><rect width="24" height="24" rx="4"/><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="%23333"/></svg>' };

    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('backroomsUser');
        if (saved) {
            currentUser = JSON.parse(saved);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        }
    });

    document.getElementById('join-btn').onclick = () => {
        const val = document.getElementById('username-input').value.trim();
        if (val) {
            currentUser.name = val;
            localStorage.setItem('backroomsUser', JSON.stringify(currentUser));
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            
            showNotification("SYNC COMPLETE", "success");
        }
    };

    document.getElementById('disconnect-btn').onclick = () => {
        localStorage.removeItem('backroomsUser');
        location.reload();
    };

    document.getElementById('avatar-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentUser.avatarUrl = ev.target.result;
            document.getElementById('avatar-preview').src = ev.target.result;
            document.getElementById('avatar-preview').style.display = 'block';
            document.getElementById('upload-icon').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- Messaging ---
    function parseMarkdown(text) {
        let html = text.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        const imgRegex = /(https?:\/\/[^\s]+?\.(?:gif|png|jpg|jpeg|webp))/gi;
        return html.replace(imgRegex, (m) => `<img src="${m}" class="media-attachment">`);
    }

    function renderMessage(data, isHistoryLoad = false) {
        const container = document.getElementById('chat-container');
        const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;

        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `
            <div class="user-header">
                <img src="${data.user.avatarUrl}" class="chat-avatar">
                <span class="username stencil-font">${data.user.name}</span>
                <span class="timestamp">${data.timestamp}</span>
            </div>
            <div class="msg-text">${parseMarkdown(data.text)}</div>
        `;
        if (data.files) {
            data.files.forEach(f => {
                const media = document.createElement(f.type.startsWith('image/') ? 'img' : 'video');
                media.src = f.data; media.className = 'media-attachment'; if(f.type.startsWith('video/')) media.controls = true;
                div.appendChild(media);
            });
        }
        container.appendChild(div);

        // Play sound if it's a new message (not loading history) and not sent by current user
        if (!isHistoryLoad && data.user.name !== currentUser.name) {
            playAnalogBlip();
        }

        setTimeout(() => {
            if (isAtBottom || data.user.name === currentUser.name) {
                container.scrollTop = container.scrollHeight;
            }
        }, 0);
    }

    socket.on('chat message', (data) => renderMessage(data, false));
    socket.on('load history', (history) => history.forEach(msg => renderMessage(msg, true)));

    // --- Typing Logic ---
    let typingTimeout;
    const typingBox = document.getElementById('typing-indicator');

    document.getElementById('chat-input').addEventListener('input', () => {
        socket.emit('typing', currentUser.name);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit('stop typing'), 1500);
    });

    socket.on('typing', (name) => {
        typingBox.textContent = `[ ${name} IS TRANSMITTING... ]`;
        typingBox.style.display = 'block';
    });

    socket.on('stop typing', () => {
        typingBox.style.display = 'none';
    });

    // --- File Handling ---
    let selectedFiles = [];
    document.getElementById('file-input').onchange = (e) => {
        selectedFiles = Array.from(e.target.files);
        const area = document.getElementById('file-preview-area');
        area.innerHTML = '';
        selectedFiles.forEach(f => {
            const item = document.createElement('div'); item.className = 'file-preview-item';
            const img = document.createElement('img'); img.src = URL.createObjectURL(f);
            item.appendChild(img); area.appendChild(item);
        });
    };

    async function handleSend() {
        if (!isConnected) return;
        
        const input = document.getElementById('chat-input');
        const text = input.value;
        if (!text.trim() && selectedFiles.length === 0) return;
        
        const filePromises = selectedFiles.map(file => new Promise(res => {
            const r = new FileReader(); r.onload = (e) => res({ type: file.type, data: e.target.result }); r.readAsDataURL(file);
        }));
        
        const files = await Promise.all(filePromises);
        socket.emit('chat message', {
            user: currentUser, text, files, timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        
        input.value = '';
        document.getElementById('file-preview-area').innerHTML = ''; 
        selectedFiles = [];
        socket.emit('stop typing');
    }

    document.getElementById('send-btn').onclick = handleSend;
    document.getElementById('chat-input').onkeydown = (e) => { 
        if(e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            handleSend(); 
        } 
    };

    document.getElementById('invite-btn').onclick = () => {
        navigator.clipboard.writeText(window.location.href);
        showNotification("URL COPIED TO CLIPBOARD", "success");
    };
</script>
</body>
</html>
