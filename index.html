<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backroom Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-color: #030712;
            --glass-bg: rgba(10, 15, 30, 0.7);
            --glass-border: rgba(0, 238, 255, 0.2);
            --accent-cyan: #00eeff;
            --accent-magenta: #ff00ea;
            --bubble-other: rgba(20, 25, 40, 0.8);
            --bubble-self: rgba(0, 238, 255, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --font-ui: 'Orbitron', sans-serif;
            --font-text: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--font-text);
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(0, 238, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 238, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* --- Notifications --- */
        #notification-container { position: fixed; top: 20px; right: 50%; transform: translateX(50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .system-notification { background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(10px); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 12px 20px; border-radius: 4px; font-family: var(--font-ui); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; box-shadow: 0 0 15px rgba(0, 238, 255, 0.2); }
        .system-notification.fade-out { animation: fadeOutUp 0.4s ease forwards; }
        @keyframes slideDown { 0% { transform: translateY(-20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOutUp { 100% { transform: translateY(-20px); opacity: 0; } }

        /* --- Login Screen --- */
        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(10px); transition: opacity 0.4s ease; }
        .login-card { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 40px; border-radius: 8px; width: 100%; max-width: 360px; text-align: center; display: flex; flex-direction: column; gap: 24px; box-shadow: 0 0 40px rgba(0, 238, 255, 0.1); position: relative; overflow: hidden; }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent); }
        .login-title { font-family: var(--font-ui); font-size: 24px; font-weight: 700; color: var(--text-main); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 238, 255, 0.5); }
        .avatar-upload-wrapper { position: relative; width: 88px; height: 88px; margin: 0 auto; background: rgba(0, 238, 255, 0.05); border: 1px dashed var(--accent-cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; color: var(--accent-cyan); font-family: var(--font-ui); font-size: 10px; font-weight: 500; text-transform: uppercase; transition: all 0.3s ease; box-shadow: inset 0 0 15px rgba(0, 238, 255, 0.1); }
        .avatar-upload-wrapper:hover { transform: scale(1.08); background: rgba(0, 238, 255, 0.1); }
        #avatar-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        #avatar-input { display: none; }
        .login-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: var(--text-main); padding: 16px; font-size: 15px; border-radius: 4px; outline: none; transition: all 0.3s ease; font-family: var(--font-text); }
        .login-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 238, 255, 0.2); }

        /* --- App Container & Breakpoints --- */
        #app-container { display: none; flex-direction: column; height: 100vh; width: 100%; max-width: 1200px; margin: 0 auto; position: relative; background: transparent; }
        @media (min-width: 768px) {
            #app-container { height: 95vh; margin-top: 2.5vh; border-radius: 8px; background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 238, 255, 0.05); overflow: hidden;}
        }

        /* --- App Header --- */
        #app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--glass-border); background: rgba(3, 7, 18, 0.6); z-index: 10; backdrop-filter: blur(10px); }
        .header-title { font-family: var(--font-ui); font-size: 18px; font-weight: 700; letter-spacing: 2px; color: var(--accent-cyan); text-transform: uppercase; text-shadow: 0 0 8px rgba(0, 238, 255, 0.4); display: flex; align-items: center; gap: 8px;}
        .header-controls { display: flex; align-items: center; gap: 12px; }

        .pulse-dot { width: 6px; height: 6px; background: var(--accent-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--accent-cyan); }
        #user-count-badge { font-family: var(--font-ui); font-size: 11px; letter-spacing: 1px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; font-weight: 500; text-transform: uppercase;}

        .btn { font-family: var(--font-ui); background: rgba(0, 238, 255, 0.1); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s ease; box-shadow: 0 0 10px rgba(0, 238, 255, 0); }
        .btn:hover { background: rgba(0, 238, 255, 0.2); box-shadow: 0 0 15px rgba(0, 238, 255, 0.3); }
        .btn:active { transform: scale(0.96); }
        .btn-secondary { background: transparent; border-color: var(--text-muted); color: var(--text-muted); }
        .btn-secondary:hover { border-color: var(--text-main); color: var(--text-main); box-shadow: none; background: rgba(255,255,255,0.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Chat Messages --- */
        #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; position: relative; }
        
        .message-wrapper { display: flex; flex-direction: column; max-width: 75%; animation: springIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transition: transform 0.2s ease; transform-origin: bottom left; position: relative; }
        .message-wrapper.self { transform-origin: bottom right; }
        .message-wrapper.other { align-self: flex-start; }
        .message-wrapper.self { align-self: flex-end; align-items: flex-end; }
        
        @keyframes springIn { 0% { opacity: 0; transform: translateY(15px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        
        .user-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 0 4px; }
        .self .user-header { flex-direction: row-reverse; }
        .chat-avatar { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; background: #000; border: 1px solid var(--user-color, var(--glass-border)); transition: all 0.3s ease; filter: sepia(0.2) hue-rotate(180deg) saturate(2); }
        .username { font-family: var(--font-ui); font-size: 11px; color: var(--user-color, var(--text-muted)); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 0 8px rgba(var(--user-color-rgb), 0.3); }
        
        .message { padding: 12px 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; position: relative; border-radius: 4px; backdrop-filter: blur(5px); }
        .other .message { background: var(--bubble-other); color: var(--text-main); border: 1px solid var(--glass-border); border-left: 3px solid var(--user-color, var(--glass-border)); }
        .self .message { background: var(--bubble-self); color: var(--accent-cyan); border: 1px solid rgba(0, 238, 255, 0.3); border-right: 3px solid var(--accent-cyan); text-shadow: 0 0 5px rgba(0, 238, 255, 0.2); }
        
        .timestamp { font-family: var(--font-ui); font-size: 9px; letter-spacing: 1px; color: var(--text-muted); margin-top: 6px; padding: 0 4px; opacity: 0.5; transition: opacity 0.2s ease; }
        .message-wrapper:hover .timestamp { opacity: 1; color: var(--accent-cyan); }
        
        .media-attachment { max-width: 100%; border-radius: 4px; margin-top: 8px; border: 1px solid var(--glass-border); transition: filter 0.2s ease; filter: contrast(1.1) brightness(0.9); }
        .media-attachment:hover { filter: contrast(1.2) brightness(1.1); }

        /* --- Click to Reply Action Button --- */
        .reply-action-btn { position: absolute; top: 50%; transform: translateY(-50%); opacity: 0; background: rgba(0, 238, 255, 0.1); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-family: var(--font-ui); font-size: 14px; z-index: 5; box-shadow: inset 0 0 5px rgba(0,238,255,0.2); }
        .message-wrapper:hover .reply-action-btn { opacity: 1; }
        .other .reply-action-btn { right: -40px; }
        .self .reply-action-btn { left: -40px; }
        .reply-action-btn:hover { background: rgba(0, 238, 255, 0.3); box-shadow: 0 0 12px rgba(0, 238, 255, 0.6); transform: translateY(-50%) scale(1.1); }

        /* --- Nested Reply Snippet --- */
        .reply-snippet { background: rgba(0, 0, 0, 0.5); border-left: 2px solid var(--accent-cyan); padding: 8px 12px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; transition: all 0.2s; border-top: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .reply-snippet:hover { background: rgba(0, 238, 255, 0.1); box-shadow: 0 0 10px rgba(0, 238, 255, 0.2); }
        .snippet-name { font-family: var(--font-ui); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .snippet-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }

        /* --- Internal Reply Modal (The Small Window) --- */
        #reply-modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 999; display: none; opacity: 0; transition: opacity 0.3s ease; }
        #reply-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(10, 15, 30, 0.95); border: 1px solid var(--accent-cyan); box-shadow: 0 0 40px rgba(0, 238, 255, 0.15), inset 0 0 20px rgba(0, 238, 255, 0.1); padding: 24px; border-radius: 8px; z-index: 1000; width: 90%; max-width: 450px; display: none; flex-direction: column; gap: 16px; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #reply-modal.active, #reply-modal-overlay.active { display: flex; opacity: 1; }
        #reply-modal.active { transform: translate(-50%, -50%) scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--glass-border); padding-bottom: 12px; }
        .modal-title { font-family: var(--font-ui); color: var(--accent-cyan); letter-spacing: 2px; font-size: 12px; text-transform: uppercase; }
        .modal-close { background: transparent; border: none; color: var(--accent-magenta); cursor: pointer; font-family: var(--font-ui); font-weight: bold; font-size: 16px; transition: transform 0.2s; }
        .modal-close:hover { transform: scale(1.2); text-shadow: 0 0 10px var(--accent-magenta); }
        #modal-body-content { font-size: 14px; line-height: 1.6; color: var(--text-main); max-height: 300px; overflow-y: auto; padding-right: 8px;}

        /* --- Typing Indicator --- */
        #typing-indicator { display: none; padding: 0 24px 12px; color: var(--accent-cyan); font-family: var(--font-ui); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .typing-dots { display: inline-flex; gap: 4px; align-items: center; margin-left: 8px; }
        .typing-dots span { width: 4px; height: 4px; background: var(--accent-cyan); border-radius: 0; animation: typePulse 1.2s infinite ease-in-out both; box-shadow: 0 0 5px var(--accent-cyan); }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typePulse { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; } 40% { transform: scale(1.5); opacity: 1; } }

        /* --- Input Area & Reply Preview Base --- */
        #input-area { padding: 16px 24px; background: rgba(3, 7, 18, 0.8); border-top: 1px solid var(--glass-border); display: flex; gap: 12px; align-items: flex-end; backdrop-filter: blur(10px); }
        .attach-btn { width: 40px; height: 40px; border-radius: 4px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); font-family: var(--font-ui); font-size: 18px; transition: all 0.2s; flex-shrink: 0; margin-bottom: 2px;}
        .attach-btn:hover { background: rgba(0, 238, 255, 0.1); border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0, 238, 255, 0.2); }

        #input-wrapper { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; transition: all 0.3s; }
        #input-wrapper:focus-within { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 238, 255, 0.15); }
        
        #reply-preview { display: none; padding: 10px 16px; background: rgba(0, 238, 255, 0.05); border-bottom: 1px solid rgba(0, 238, 255, 0.1); align-items: center; justify-content: space-between; animation: slideDown 0.2s ease; }
        #cancel-reply-btn { background: transparent; border: none; color: var(--accent-magenta); font-family: var(--font-ui); cursor: pointer; font-size: 14px; transition: transform 0.2s; }
        #cancel-reply-btn:hover { transform: scale(1.2); text-shadow: 0 0 8px var(--accent-magenta); }

        #chat-input { width: 100%; background: transparent; border: none; color: var(--text-main); padding: 12px 16px; font-size: 14px; outline: none; resize: none; min-height: 44px; max-height: 120px; font-family: var(--font-text); line-height: 1.5; }
        
        #file-preview-area { display: flex; gap: 8px; padding: 0; overflow-x: auto;}
        #file-preview-area:not(:empty) { padding: 12px 16px 0; }
        .file-preview-item { width: 48px; height: 48px; border-radius: 4px; overflow: hidden; border: 1px solid var(--accent-cyan); animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .file-preview-item img { width: 100%; height: 100%; object-fit: cover; }

        .send-btn { width: 40px; height: 40px; border-radius: 4px; background: rgba(0, 238, 255, 0.15); border: 1px solid var(--accent-cyan); display: flex; align-items: center; justify-content: center; color: var(--accent-cyan); cursor: pointer; flex-shrink: 0; transition: all 0.2s; margin-bottom: 2px; overflow: hidden; box-shadow: inset 0 0 10px rgba(0, 238, 255, 0); }
        .send-btn:hover { background: rgba(0, 238, 255, 0.3); box-shadow: inset 0 0 15px rgba(0, 238, 255, 0.4), 0 0 15px rgba(0, 238, 255, 0.3); }
        .send-btn:active { transform: scale(0.92); }
        .send-btn:disabled { background: transparent; border-color: var(--glass-border); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }
        
        .send-icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter; transform: translateY(-1px) translateX(1px); transition: transform 0.3s ease; }
        .send-btn.animating .send-icon { animation: flySend 0.4s ease forwards; }

        @keyframes flySend {
            0% { transform: translate(1px, -1px); opacity: 1; }
            40% { transform: translate(20px, -20px); opacity: 0; }
            41% { transform: translate(-20px, 20px); opacity: 0; }
            100% { transform: translate(1px, -1px); opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }
    </style>
</head>
<body>

<div id="notification-container"></div>

<div id="login-screen">
    <div class="login-card">
        <div class="login-title">Initialize Link</div>
        <label for="avatar-input" class="avatar-upload-wrapper">
            <span id="upload-icon">Bio-Scan</span>
            <img id="avatar-preview" src="" alt="Avatar Preview">
        </label>
        <input type="file" id="avatar-input" accept="image/*">
        <input type="text" id="username-input" class="login-input" placeholder="Enter Callsign" autocomplete="off">
        <button class="btn" id="join-btn">Engage</button>
    </div>
</div>

<div id="app-container">
    <div id="app-header">
        <div class="header-title">BACKROOM</div>
        <div class="header-controls">
            <div id="user-count-badge">
                <div class="pulse-dot"></div>
                <span id="count-number">0</span> Active
            </div>
            <button id="invite-btn" class="btn btn-secondary">Uplink</button>
            <button id="disconnect-btn" class="btn btn-secondary" style="color: var(--accent-magenta); border-color: rgba(255, 0, 234, 0.3);">Sever</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="reply-modal-overlay"></div>
        <div id="reply-modal">
            <div class="modal-header">
                <span class="modal-title">Decrypted Sequence</span>
                <button class="modal-close" id="close-modal-btn">X</button>
            </div>
            <div class="user-header" id="modal-user-header" style="margin:0;"></div>
            <div id="modal-body-content"></div>
        </div>
    </div>
    
    <div id="typing-indicator">
        <span id="typing-name">Entity</span> transmitting
        <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
    
    <div id="input-area">
        <label for="file-input" class="attach-btn">+</label>
        <input type="file" id="file-input" multiple style="display:none">
        
        <div id="input-wrapper">
            <div id="reply-preview">
                <div style="display:flex; flex-direction:column; gap:2px;">
                    <span id="reply-preview-name" style="font-family:var(--font-ui); color:var(--accent-cyan); font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;"></span>
                    <span id="reply-preview-text" style="color:var(--text-muted); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 300px;"></span>
                </div>
                <button id="cancel-reply-btn">X</button>
            </div>

            <div id="file-preview-area"></div>
            <textarea id="chat-input" placeholder="Input sequence..." rows="1"></textarea>
        </div>
        
        <button class="send-btn" id="send-btn">
            <svg class="send-icon" viewBox="0 0 24 24">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </button>
    </div>
</div>

<script>
    const socket = io(); 
    let isConnected = true;

    // Stores message data globally by ID so we can render full modals easily
    const messageStore = {};
    let activeReplyTarget = null;

    // --- Helper: Generate Unique Colors based on Username ---
    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        const h = Math.abs(hash) % 360;
        return `hsl(${h}, 100%, 65%)`;
    }

    // --- Sci-Fi Audio Synthesizer ---
    function playChime() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.15);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.15);
        } catch (e) { console.log("Web Audio API not supported."); }
    }

    // --- System Notifications ---
    function showNotification(text) {
        const container = document.getElementById('notification-container');
        const note = document.createElement('div');
        note.className = `system-notification`;
        note.innerHTML = text;
        container.appendChild(note);
        setTimeout(() => {
            note.classList.add('fade-out');
            setTimeout(() => note.remove(), 400);
        }, 3000);
    }

    // --- Connection Resilience ---
    socket.on('disconnect', () => {
        isConnected = false;
        showNotification("Signal lost...");
        document.getElementById('chat-input').disabled = true;
        document.getElementById('send-btn').disabled = true;
    });

    socket.on('connect', () => {
        if (!isConnected) {
            isConnected = true;
            showNotification("Signal acquired");
            document.getElementById('chat-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
        }
    });

    socket.on('user count', (count) => {
        document.getElementById('count-number').textContent = count;
    });

    // --- Identity Logic ---
    let currentUser = { name: 'User', avatarUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2300eeff"><circle cx="12" cy="8" r="4"/><path d="M12 14c-4 0-7 2-7 6v1h14v-1c0-4-3-6-7-6z"/></svg>' };

    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('futureChatUser');
        if (saved) {
            currentUser = JSON.parse(saved);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        }
    });

    document.getElementById('join-btn').onclick = () => {
        const val = document.getElementById('username-input').value.trim();
        if (val) {
            currentUser.name = val;
            localStorage.setItem('futureChatUser', JSON.stringify(currentUser));
            
            const loginScreen = document.getElementById('login-screen');
            loginScreen.style.opacity = '0';
            setTimeout(() => {
                loginScreen.style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
            }, 400);
        }
    };

    document.getElementById('disconnect-btn').onclick = () => {
        localStorage.removeItem('futureChatUser');
        location.reload();
    };

    document.getElementById('avatar-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentUser.avatarUrl = ev.target.result;
            document.getElementById('avatar-preview').src = ev.target.result;
            document.getElementById('avatar-preview').style.display = 'block';
            document.getElementById('upload-icon').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- Messaging & Reply Logic ---
    function parseMarkdown(text) {
        let html = text.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        const imgRegex = /(https?:\/\/[^\s]+?\.(?:gif|png|jpg|jpeg|webp))/gi;
        return html.replace(imgRegex, (m) => `<img src="${m}" class="media-attachment">`);
    }

    // Triggered when user clicks the ↰ icon on a message
    window.initiateReply = function(msgId) {
        const msg = messageStore[msgId];
        if(!msg) return;

        // Save a lean payload so we don't broadcast huge base64 images unnecessarily
        activeReplyTarget = {
            id: msgId,
            user: msg.user,
            text: msg.text,
            hasFiles: (msg.files && msg.files.length > 0)
        };

        document.getElementById('reply-preview-name').textContent = msg.user.name;
        let preview = msg.text || '[ ENCRYPTED ATTACHMENT ]';
        document.getElementById('reply-preview-text').textContent = preview;
        
        document.getElementById('reply-preview').style.display = 'flex';
        document.getElementById('chat-input').focus();
    };

    document.getElementById('cancel-reply-btn').onclick = () => {
        activeReplyTarget = null;
        document.getElementById('reply-preview').style.display = 'none';
    };

    // Triggered when user clicks the nested snippet to view the modal
    window.openReplyModal = function(msgId) {
        const data = messageStore[msgId] || messageStore['reply_' + msgId];
        if(!data) return;

        const targetData = data.replyTo ? data.replyTo : data;
        const userColor = stringToColor(targetData.user.name);

        document.getElementById('modal-user-header').innerHTML = `
            <img src="${targetData.user.avatarUrl}" class="chat-avatar" style="border-color: ${userColor}">
            <span class="username" style="color: ${userColor}; text-shadow: 0 0 8px ${userColor}">${targetData.user.name}</span>
        `;
        
        let bodyHtml = targetData.text ? parseMarkdown(targetData.text) : '';
        if (targetData.hasFiles) bodyHtml += `<br/><br/><span style="color:var(--text-muted); font-size:12px;">[ DATA ATTACHMENTS OMITTED FROM PREVIEW ]</span>`;
        
        document.getElementById('modal-body-content').innerHTML = bodyHtml;
        
        document.getElementById('reply-modal-overlay').classList.add('active');
        document.getElementById('reply-modal').classList.add('active');
    };

    document.getElementById('close-modal-btn').onclick = () => {
        document.getElementById('reply-modal-overlay').classList.remove('active');
        document.getElementById('reply-modal').classList.remove('active');
    };

    function renderMessage(data, isHistoryLoad = false) {
        const container = document.getElementById('chat-container');
        const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;
        const isSelf = data.user.name === currentUser.name;
        
        // Ensure every message has a unique ID for our global dictionary
        if (!data.id) data.id = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        messageStore[data.id] = data;

        const userColor = stringToColor(data.user.name);

        const div = document.createElement('div');
        div.className = `message-wrapper ${isSelf ? 'self' : 'other'}`;
        
        let headerHtml = '';
        if (!isSelf) {
            headerHtml = `
                <div class="user-header" style="--user-color: ${userColor};">
                    <img src="${data.user.avatarUrl}" class="chat-avatar">
                    <span class="username">${data.user.name}</span>
                </div>
            `;
        }

        // Handle nested reply snippets
        let replyHtml = '';
        if (data.replyTo) {
            // Store the fallback payload in case the original message isn't in their current history buffer
            messageStore['reply_' + data.id] = data; 
            
            const replyColor = stringToColor(data.replyTo.user.name);
            const snippetText = data.replyTo.text || '[ ENCRYPTED ATTACHMENT ]';
            
            replyHtml = `
                <div class="reply-snippet" onclick="openReplyModal('${data.id}')" style="border-left-color: ${replyColor}">
                    <span class="snippet-name" style="color: ${replyColor}">${data.replyTo.user.name}</span>
                    <span class="snippet-text">${snippetText}</span>
                </div>
            `;
        }

        let mediaHtml = '';
        if (data.files) {
            data.files.forEach(f => {
                const tag = f.type.startsWith('image/') ? 'img' : 'video';
                const controls = f.type.startsWith('video/') ? 'controls' : '';
                mediaHtml += `<${tag} src="${f.data}" class="media-attachment" ${controls}></${tag}>`;
            });
        }

        // Hover action button
        const replyBtnHtml = `<div class="reply-action-btn" onclick="initiateReply('${data.id}')">↰</div>`;

        div.innerHTML = `
            ${headerHtml}
            <div class="message" style="${!isSelf ? `--user-color: ${userColor};` : ''}">
                ${replyHtml}
                ${parseMarkdown(data.text)}
                ${mediaHtml}
            </div>
            <span class="timestamp">${data.timestamp}</span>
            ${replyBtnHtml}
        `;
        
        container.appendChild(div);

        if (!isHistoryLoad && !isSelf) {
            playChime();
        }

        setTimeout(() => {
            if (isAtBottom || isSelf) {
                container.scrollTop = container.scrollHeight;
            }
        }, 0);
    }

    socket.on('chat message', (data) => renderMessage(data, false));
    socket.on('load history', (history) => history.forEach(msg => renderMessage(msg, true)));

    // --- Typing Logic ---
    let typingTimeout;
    const typingIndicator = document.getElementById('typing-indicator');
    const typingName = document.getElementById('typing-name');

    document.getElementById('chat-input').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        
        socket.emit('typing', currentUser.name);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit('stop typing'), 1500);
    });

    socket.on('typing', (name) => {
        typingName.textContent = name;
        typingIndicator.style.display = 'block';
        const container = document.getElementById('chat-container');
        container.scrollTop = container.scrollHeight;
    });

    socket.on('stop typing', () => {
        typingIndicator.style.display = 'none';
    });

    // --- File Handling ---
    let selectedFiles = [];
    document.getElementById('file-input').onchange = (e) => {
        selectedFiles = Array.from(e.target.files);
        const area = document.getElementById('file-preview-area');
        area.innerHTML = '';
        selectedFiles.forEach(f => {
            const item = document.createElement('div'); item.className = 'file-preview-item';
            const img = document.createElement('img'); img.src = URL.createObjectURL(f);
            item.appendChild(img); area.appendChild(item);
        });
    };

    async function handleSend() {
        if (!isConnected) return;
        
        const input = document.getElementById('chat-input');
        const text = input.value;
        if (!text.trim() && selectedFiles.length === 0) return;
        
        const sendBtn = document.getElementById('send-btn');
        sendBtn.classList.remove('animating');
        void sendBtn.offsetWidth; 
        sendBtn.classList.add('animating');

        const filePromises = selectedFiles.map(file => new Promise(res => {
            const r = new FileReader(); r.onload = (e) => res({ type: file.type, data: e.target.result }); r.readAsDataURL(file);
        }));
        
        const files = await Promise.all(filePromises);
        
        socket.emit('chat message', {
            user: currentUser, 
            text, 
            files, 
            timestamp: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            replyTo: activeReplyTarget  // Attach the reply payload here
        });
        
        // Reset UI
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('file-preview-area').innerHTML = ''; 
        selectedFiles = [];
        activeReplyTarget = null;
        document.getElementById('reply-preview').style.display = 'none';
        socket.emit('stop typing');
    }

    document.getElementById('send-btn').onclick = handleSend;
    document.getElementById('chat-input').onkeydown = (e) => { 
        if(e.key === 'Enter' && !e.shiftKey) { 
            e.preventDefault(); 
            handleSend(); 
        } 
    };

    document.getElementById('invite-btn').onclick = () => {
        navigator.clipboard.writeText(window.location.href);
        showNotification("Data link copied");
    };
</script>
</body>
</html>
