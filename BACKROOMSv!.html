<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms Private Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Saira+Stencil+One&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>

    <style>
        /* [Keeping your original styles here for body, starfield, login-card, and messages] */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #050508; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .stencil-font { font-family: 'Saira Stencil One', cursive; font-weight: normal; }
        #starfield { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; background-image: radial-gradient(circle at 15% 50%, rgba(20, 15, 45, 0.8), transparent 50%), radial-gradient(circle at 85% 30%, rgba(10, 30, 50, 0.8), transparent 50%); }
        #app-container { display: none; flex-direction: column; height: 100%; width: 50%; margin: 0 auto; position: relative; background: rgba(10, 10, 15, 0.4); border-left: 1px solid rgba(255, 255, 255, 0.05); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        @media (max-width: 800px) { #app-container { width: 100%; } }
        #app-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(20px); z-index: 10; }
        
        /* New Signals UI */
        #user-signals { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #00d2ff; background: rgba(0, 210, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.2); padding: 4px 10px; border-radius: 4px; }
        .orbit-circle { width: 6px; height: 6px; background: #00d2ff; border-radius: 50%; animation: orbitPulse 1.5s infinite ease-in-out; }
        @keyframes orbitPulse { 50% { transform: scale(1.2); box-shadow: 0 0 10px #00d2ff; } }
        
        /* [Keeping your message, input-area, and button styles] */
        #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        .message { position: relative; word-wrap: break-word; line-height: 1.6; font-size: 15px; padding: 14px 18px; border-radius: 4px 12px 12px 12px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-left: 3px solid #00d2ff; }
        .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .chat-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .username { color: #00d2ff; font-size: 14px; }
        .timestamp { margin-left: auto; font-size: 10px; opacity: 0.3; }
        #input-area { padding: 20px 24px; background: rgba(10, 10, 15, 0.8); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; gap: 12px; }
        #chat-input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 8px; resize: none; }
        .btn { background: #00d2ff; color: #000; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="login-screen">
    <div class="login-card">
        <h1 class="login-title stencil-font">Link Established</h1>
        <input type="text" id="username-input" class="login-input" placeholder="Enter Callsign...">
        <button class="btn stencil-font" id="join-btn">Initialize</button>
    </div>
</div>

<div id="app-container">
    <div id="app-header">
        <div class="header-title stencil-font">BACKROOMS <span>PRIVATE CHAT</span></div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div id="user-signals">
                <div class="orbit-circle"></div>
                <span>SIGNALS:</span> <span id="active-count" class="stencil-font">0</span>
            </div>
            <button id="disconnect-btn" class="stencil-font" style="background: rgba(255,51,51,0.1); color:#ff3333; border:1px solid #ff3333; padding:5px 10px; border-radius:4px; cursor:pointer;">Exit</button>
        </div>
    </div>
    <div id="chat-container"></div>
    <div id="input-area">
        <textarea id="chat-input" placeholder="..." rows="1"></textarea>
        <button class="btn stencil-font" id="send-btn">Send</button>
    </div>
</div>

<script>
    const socket = io();
    let currentUser = { name: 'Guest', avatarUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2300d2ff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>' };
    const chatContainer = document.getElementById('chat-container');

    // 1. User Count Signals
    socket.on('user count', (count) => {
        document.getElementById('active-count').textContent = count;
    });

    // 2. Load History
    socket.on('load history', (history) => {
        if (history.length > 0) {
            const div = document.createElement('div');
            div.style = "text-align: center; font-size: 10px; opacity: 0.2; margin: 20px 0; letter-spacing: 2px;";
            div.className = "stencil-font";
            div.textContent = "--- RECOVERED LOGS ---";
            chatContainer.appendChild(div);
            history.forEach(data => renderIncomingMessage(data));
        }
    });

    // 3. Receive Messages
    socket.on('chat message', (data) => renderIncomingMessage(data));

    function renderIncomingMessage(data) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        // Distinct styling if it's a SYSTEM message
        if (data.user.name === 'SYSTEM') {
            msgDiv.style.borderLeftColor = '#ff3333';
            msgDiv.style.background = 'rgba(255, 51, 51, 0.02)';
        }

        msgDiv.innerHTML = `
            <div class="user-header">
                <img src="${data.user.avatarUrl}" class="chat-avatar">
                <span class="username stencil-font">${data.user.name}</span>
                <span class="timestamp">${data.timestamp}</span>
            </div>
            <div class="msg-text" style="${data.user.name === 'SYSTEM' ? 'font-style: italic; opacity: 0.7;' : ''}">
                ${data.text}
            </div>
        `;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    }

    // [Keeping your login and sending logic]
    document.getElementById('join-btn').onclick = () => {
        const name = document.getElementById('username-input').value.trim();
        if (name) currentUser.name = name;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
    };
    document.getElementById('send-btn').onclick = () => {
        const text = document.getElementById('chat-input').value;
        if (!text.trim()) return;
        socket.emit('chat message', { user: currentUser, text, timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
        document.getElementById('chat-input').value = '';
    };
</script>
</body>
</html>
