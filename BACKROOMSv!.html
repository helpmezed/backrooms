<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms Private Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Saira+Stencil+One&display=swap" rel="stylesheet">
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050508; 
            color: #e2e8f0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .stencil-font { font-family: 'Saira Stencil One', cursive; font-weight: normal; }

        /* Canvas Background */
        #starfield {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
            background-image: radial-gradient(circle at 15% 50%, rgba(20, 15, 45, 0.8), transparent 50%),
                              radial-gradient(circle at 85% 30%, rgba(10, 30, 50, 0.8), transparent 50%);
        }

        /* --- Notifications & Popups --- */
        #notification-container { position: fixed; top: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .system-notification { background: rgba(0, 210, 255, 0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(0, 210, 255, 0.3); border-left: 4px solid #00d2ff; color: #fff; padding: 14px 24px; border-radius: 4px 10px 10px 4px; font-size: 14px; letter-spacing: 1px; box-shadow: 0 4px 20px rgba(0, 210, 255, 0.15); display: flex; align-items: center; gap: 12px; animation: hudSlideIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .system-notification.success { border-left-color: #00ff66; box-shadow: 0 4px 20px rgba(0, 255, 102, 0.15); }
        .system-notification.fade-out { animation: hudFadeOut 0.5s forwards; }
        @keyframes hudSlideIn { 0% { transform: translateX(120%) skewX(-15deg); opacity: 0; } 70% { transform: translateX(-10px) skewX(5deg); opacity: 1; } 100% { transform: translateX(0) skewX(0); opacity: 1; } }
        @keyframes hudFadeOut { 100% { transform: translateX(120%) scale(0.9); opacity: 0; } }

        #popup-layer { position: fixed; inset: 0; pointer-events: none; z-index: 500; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .keyword-hologram { position: absolute; font-size: 64px; text-transform: uppercase; animation: holoPop 2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; opacity: 0; white-space: nowrap; }
        @keyframes holoPop { 0% { transform: scale(0.5) translateY(100px); opacity: 0; filter: blur(10px); } 20% { transform: scale(1.2) translateY(0); opacity: 1; filter: blur(0); } 80% { transform: scale(1) translateY(-20px); opacity: 0.8; filter: blur(0); } 100% { transform: scale(1.5) translateY(-50px); opacity: 0; filter: blur(15px); } }

        /* --- Login Screen --- */
        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(15px); }
        .login-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 210, 255, 0.05); width: 100%; max-width: 400px; text-align: center; display: flex; flex-direction: column; gap: 20px; }
        .login-title { font-size: 28px; color: #00d2ff; letter-spacing: 2px; text-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        .avatar-upload-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto; border-radius: 50%; background: rgba(0, 0, 0, 0.4); border: 2px dashed rgba(255, 255, 255, 0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; transition: all 0.3s ease; }
        .avatar-upload-wrapper:hover { border-color: #00d2ff; }
        #avatar-preview { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 50%; }
        #avatar-input { display: none; }
        .login-input { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 16px; border-radius: 10px; font-size: 16px; font-family: 'Inter', sans-serif; outline: none; transition: all 0.3s ease; }
        .login-input:focus { border-color: rgba(0, 210, 255, 0.4); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }

        /* --- Chat Main App --- */
        #app-container { display: none; flex-direction: column; height: 100%; width: 50%; margin: 0 auto; position: relative; background: rgba(10, 10, 15, 0.4); border-left: 1px solid rgba(255, 255, 255, 0.05); border-right: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 0 50px rgba(0, 0, 0, 0.5); }
        @media (max-width: 800px) { #app-container { width: 100%; border: none; } }

        /* --- App Header & Interactive Invite Button --- */
        #app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(20px); z-index: 10;
        }
        .header-title { font-size: 18px; color: #00d2ff; letter-spacing: 1px; text-transform: uppercase; }
        .header-title span { color: #fff; }
        
        #invite-btn {
            position: relative; overflow: hidden; /* Needed for ripple */
            background: rgba(0, 210, 255, 0.1); border: 1px solid #00d2ff; color: #fff;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; display: flex; align-items: center;
            font-size: 14px; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #invite-btn:hover { background: rgba(0, 210, 255, 0.3); box-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }
        
        #invite-btn.clicked {
            background: rgba(0, 255, 102, 0.2); border-color: #00ff66; color: #00ff66;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.4); transform: scale(0.95);
        }
        .btn-ripple {
            position: absolute; border-radius: 50%; background: rgba(0, 255, 102, 0.6);
            transform: scale(0); animation: rippleEffect 0.6s linear; pointer-events: none;
        }
        @keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

        #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; z-index: 1; position: relative; }
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        
        .message { position: relative; word-wrap: break-word; line-height: 1.6; font-size: 15px; padding: 14px 18px; border-radius: 4px 12px 12px 12px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-left: 3px solid #00d2ff; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); will-change: transform, opacity; max-width: 90%; display: flex; flex-direction: column; }
        .user-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; width: 100%; }
        .chat-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(0, 210, 255, 0.4); }
        .username { font-size: 16px; letter-spacing: 1px; color: #00d2ff; text-shadow: 0 0 10px rgba(0, 210, 255, 0.4); }
        .timestamp { margin-left: auto; font-size: 11px; color: rgba(255, 255, 255, 0.3); font-family: 'Inter', sans-serif; }
        
        /* Markdown Styles */
        .msg-text strong { color: #fff; font-weight: 600; text-shadow: 0 0 5px rgba(255,255,255,0.3); }
        .msg-text em { color: #a970ff; font-style: italic; }
        .msg-text code { background: rgba(0, 210, 255, 0.1); border: 1px solid rgba(0, 210, 255, 0.3); padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #00d2ff; font-size: 13px; }

        /* Hover Actions */
        .msg-actions { position: absolute; top: -10px; right: 10px; background: #1a1a24; border: 1px solid #303032; border-radius: 6px; padding: 4px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .message:hover .msg-actions { opacity: 1; }
        .action-btn { background: transparent; border: none; color: #efeff1; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .action-btn:hover { background: rgba(255,255,255,0.1); color: #00d2ff; }

        @keyframes warpIn { 0% { transform: scale(1.05) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .anim-text { animation: warpIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .media-attachment { max-width: 100%; max-height: 400px; width: auto; height: auto; object-fit: contain; border-radius: 8px; margin-top: 12px; display: block; border: 1px solid rgba(255, 255, 255, 0.1); }

        #typing-indicator { display: none; padding: 0 24px 16px 24px; align-items: center; gap: 12px; color: rgba(255, 255, 255, 0.5); font-size: 14px; letter-spacing: 1px; z-index: 1; }
        .orbit-circle { width: 8px; height: 8px; background: #00d2ff; border-radius: 50%; animation: orbitPulse 1.5s infinite ease-in-out; }
        @keyframes orbitPulse { 50% { transform: scale(1.2); box-shadow: 0 0 10px #00d2ff; } }

        #scroll-bottom-btn {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 210, 255, 0.1); border: 1px solid #00d2ff; backdrop-filter: blur(5px);
            color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 12px; cursor: pointer;
            display: none; z-index: 20; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: background 0.2s;
        }
        #scroll-bottom-btn:hover { background: rgba(0, 210, 255, 0.3); }

        /* --- Input Area --- */
        #input-area { padding: 20px 24px; background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; gap: 12px; align-items: flex-end; z-index: 10; transition: all 0.3s ease; }
        
        /* Drag and Drop style */
        #input-area.drag-over { background: rgba(0, 210, 255, 0.15); border-top: 1px solid #00d2ff; }

        .file-label { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; padding: 14px; border-radius: 10px; display: flex; transition: all 0.3s ease; height: 52px; align-items: center; justify-content: center; }
        .file-label:hover { border-color: rgba(0, 210, 255, 0.5); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }
        #file-input { display: none; }
        #input-wrapper { flex: 1; background: rgba(0, 0, 0, 0.4); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; transition: all 0.3s ease; }
        #input-wrapper:focus-within { border-color: rgba(0, 210, 255, 0.4); box-shadow: 0 0 20px rgba(0, 210, 255, 0.05); }

        /* Previews */
        #file-preview-area { display: flex; gap: 12px; padding: 0; overflow-x: auto; transition: padding 0.3s ease; }
        #file-preview-area:not(:empty) { padding: 12px 16px 0 16px; }
        .file-preview-item { position: relative; width: 60px; height: 60px; border-radius: 8px; border: 1px solid #00d2ff; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; animation: previewPopIn 0.2s forwards, pulseReady 0.25s ease-in-out 0.2s 2; }
        .file-preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
        .ready-check { position: absolute; top: -6px; right: -6px; background: #00ff66; color: #000; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(0, 255, 102, 0.6); animation: popIn 0.3s forwards 0.6s; opacity: 0; transform: scale(0); }
        @keyframes previewPopIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulseReady { 50% { transform: scale(1.1); box-shadow: 0 0 15px rgba(0, 210, 255, 0.8); } }
        @keyframes popIn { to { opacity: 1; transform: scale(1); } }

        #chat-input { width: 100%; background: transparent; border: none; color: #fff; padding: 16px; font-size: 15px; outline: none; resize: none; min-height: 52px; max-height: 150px; scrollbar-width: thin; scrollbar-color: rgba(0, 210, 255, 0.3) transparent; }
        .btn { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white; border: none; padding: 0 28px; border-radius: 10px; cursor: pointer; font-size: 18px; height: 52px; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0, 210, 255, 0.4); }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="notification-container"></div>

<div id="login-screen">
    <div class="login-card">
        <h1 class="login-title stencil-font">Link Established</h1>
        <label for="avatar-input" class="avatar-upload-wrapper" title="Upload Profile Picture">
            <span id="upload-icon">📷</span>
            <img id="avatar-preview" src="" alt="Avatar Preview">
        </label>
        <input type="file" id="avatar-input" accept="image/*">
        <input type="text" id="username-input" class="login-input" placeholder="Enter Callsign..." autocomplete="off">
        <button class="btn stencil-font" id="join-btn">Initialize</button>
    </div>
</div>

<div id="app-container">
    <div id="app-header">
        <div class="header-title stencil-font">BACKROOMS <span>PRIVATE CHAT</span></div>
        <button id="invite-btn" class="stencil-font">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
            </svg>
            Invite Link
        </button>
    </div>

    <div id="popup-layer"></div>
    <div id="chat-container"></div>
    
    <button id="scroll-bottom-btn" class="stencil-font">↓ New Messages</button>

    <div id="typing-indicator">
        <div class="orbit-circle"></div>
        <span class="stencil-font">Incoming transmission...</span>
    </div>

    <div id="input-area">
        <label for="file-input" class="file-label" title="Attach Files">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </label>
        <input type="file" id="file-input" multiple>
        
        <div id="input-wrapper">
            <div id="file-preview-area"></div>
            <textarea id="chat-input" placeholder="Transmit message... (Markdown supported: **bold**, *italic*, `code`)" rows="1"></textarea>
        </div>
        
        <button class="btn stencil-font" id="send-btn">Send</button>
    </div>
</div>

<script>
    // --- INITIALIZE SOCKET.IO ---
    const socket = io(); 

    // --- Canvas Starfield ---
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let mouseX = 0, mouseY = 0;

    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 150}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            z: Math.random() * 2, radius: Math.random() * 1.5,
            alpha: Math.random()
        }));
    }
    initStars();
    window.addEventListener('resize', initStars);
    document.addEventListener('mousemove', (e) => { mouseX = (e.clientX - canvas.width/2) * 0.05; mouseY = (e.clientY - canvas.height/2) * 0.05; });

    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => {
            star.x -= star.z * 0.5 + (mouseX * star.z * 0.02);
            star.y -= (mouseY * star.z * 0.02);
            if(star.x < 0) star.x = canvas.width;
            if(star.x > canvas.width) star.x = 0;
            if(star.y < 0) star.y = canvas.height;
            if(star.y > canvas.height) star.y = 0;
            
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
            ctx.fill();
        });
        requestAnimationFrame(animateStars);
    }
    animateStars();

    // --- Web Audio API UI Sounds ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (type === 'send') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'receive') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'success') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    // --- Upgraded Markdown & GIF Parser ---
    function parseMarkdown(text) {
        if (!text) return '';
        
        // 1. Sanitize the text
        let html = text.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        
        // 2. Apply bold, italic, and code markdown
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        html = html.replace(/`(.*?)`/g, '<code>$1</code>');
        
        // 3. Auto-Embed GIF and Image Links
        const imageRegex = /(https?:\/\/[^\s]+?\.(?:gif|png|jpg|jpeg|webp)(?:\?[^\s]*)?)/gi;
        
        html = html.replace(imageRegex, (match) => {
            return `<img src="${match}" class="media-attachment" alt="Embedded Media" style="max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid rgba(0, 210, 255, 0.3);">`;
        });

        return html;
    }

    // App State & DOM Elements
    let currentUser = { name: 'Guest', avatarUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2300d2ff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>' };
    const chatContainer = document.getElementById('chat-container');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const fileInput = document.getElementById('file-input');
    const filePreviewArea = document.getElementById('file-preview-area');
    const typingIndicator = document.getElementById('typing-indicator');
    const popupLayer = document.getElementById('popup-layer');
    const scrollBtn = document.getElementById('scroll-bottom-btn');
    const inviteBtn = document.getElementById('invite-btn');
    const inputArea = document.getElementById('input-area');
    const originalInviteHTML = inviteBtn.innerHTML;
    
    let selectedFiles = []; let typingTimeout; let isScrolledUp = false;

    // --- Smart Scroll Logic ---
    chatContainer.addEventListener('scroll', () => {
        isScrolledUp = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight > 50;
        scrollBtn.style.display = isScrolledUp ? 'block' : 'none';
    });
    scrollBtn.addEventListener('click', () => {
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    });

    // --- Generic System Notifications ---
    function showNotification(message, type = 'info') {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div');
        notif.className = `system-notification stencil-font ${type}`;
        
        let iconHtml = type === 'success' 
            ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00ff66" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>`
            : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00d2ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="22" y1="11" x2="16" y2="11"></line></svg>`;

        notif.innerHTML = `${iconHtml}<span>${message}</span>`;
        container.appendChild(notif);
        
        setTimeout(() => {
            notif.classList.add('fade-out');
            notif.addEventListener('animationend', () => notif.remove());
        }, 4000);
    }

    // --- Animated Invite Button Logic ---
    inviteBtn.addEventListener('click', function(e) {
        if(this.classList.contains('clicked')) return;
        const inviteLink = window.location.origin + window.location.pathname;
        navigator.clipboard.writeText(inviteLink).then(() => {
            playBeep('success');
            showNotification('[SYS] Invite link copied to clipboard!', 'success');
            
            this.classList.add('clicked');
            this.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;"><polyline points="20 6 9 17 4 12"></polyline></svg> COPIED!`;
            
            const circle = document.createElement('span');
            const diameter = Math.max(this.clientWidth, this.clientHeight);
            const radius = diameter / 2;
            const rect = this.getBoundingClientRect();
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${e.clientX - rect.left - radius}px`;
            circle.style.top = `${e.clientY - rect.top - radius}px`;
            circle.classList.add('btn-ripple');
            
            const existingRipple = this.querySelector('.btn-ripple');
            if(existingRipple) existingRipple.remove();
            
            this.appendChild(circle);

            setTimeout(() => {
                this.classList.remove('clicked');
                this.innerHTML = originalInviteHTML;
                const rippleToRemove = this.querySelector('.btn-ripple');
                if(rippleToRemove) rippleToRemove.remove();
            }, 2000);
        });
    });

    // --- Keyword Animation Logic ---
    const triggers = {
        'lol': { text: '😂 LOL', color: '#ffae00' }, 'haha': { text: '😂 HAHA', color: '#ffae00' },
        'lmfao': { text: '💀 LMFAO', color: '#ff3333' }, 'hi': { text: '👋 INCOMING', color: '#00d2ff' },
        'bro': { text: '👊 BRO', color: '#bf94ff' }, 'have you seen this': { text: '👁️ SCANNING', color: '#ff3366' },
        'work': { text: '⚙️ PROCESSING', color: '#00ff66' }
    };
    function checkKeywords(text) {
        const lowerText = text.toLowerCase();
        for (const [key, config] of Object.entries(triggers)) {
            if (new RegExp(`\\b${key}\\b`, 'i').test(lowerText) || (key.includes(' ') && lowerText.includes(key))) {
                const holo = document.createElement('div');
                holo.className = 'keyword-hologram stencil-font';
                holo.textContent = config.text; holo.style.color = config.color;
                holo.style.textShadow = `0 0 20px ${config.color}, 0 0 40px ${config.color}`;
                holo.style.left = `calc(50% + ${Math.random() * 100 - 50}px)`;
                holo.style.top = `calc(50% + ${Math.random() * 100 - 50}px)`;
                holo.style.transform = 'translate(-50%, -50%)';
                popupLayer.appendChild(holo); setTimeout(() => holo.remove(), 2000);
            }
        }
    }

    // --- Memory Safe URLs ---
    const objectURLs = new Set();
    function createSafeURL(file) {
        const url = URL.createObjectURL(file);
        objectURLs.add(url);
        return url;
    }

    // --- Core UI Logic ---
    document.getElementById('avatar-input').addEventListener('change', (e) => {
        if (e.target.files[0]) {
            // Read avatar as base64 so it can be sent over socket.io easily
            const reader = new FileReader();
            reader.onload = (event) => {
                currentUser.avatarUrl = event.target.result;
                document.getElementById('avatar-preview').src = currentUser.avatarUrl;
                document.getElementById('avatar-preview').style.display = 'block';
                document.getElementById('upload-icon').style.display = 'none';
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    function handleLogin() {
        const name = document.getElementById('username-input').value.trim();
        if (name) currentUser.name = name;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        playBeep('receive');
        showNotification(`[SYS] ${currentUser.name} connected`);
        chatInput.focus();
    }
    document.getElementById('join-btn').addEventListener('click', handleLogin);
    document.getElementById('username-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleLogin(); } });

    chatInput.addEventListener('input', () => {
        chatInput.style.height = 'auto'; chatInput.style.height = (chatInput.scrollHeight) + 'px';
        typingIndicator.style.display = 'flex';
        if(!isScrolledUp) chatContainer.scrollTop = chatContainer.scrollHeight;
        clearTimeout(typingTimeout); typingTimeout = setTimeout(() => { typingIndicator.style.display = 'none'; }, 1500);
    });

    // --- Drag & Drop Handling ---
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        inputArea.addEventListener(eventName, e => {
            e.preventDefault();
            e.stopPropagation();
        }, false);
    });
    inputArea.addEventListener('dragover', () => inputArea.classList.add('drag-over'));
    inputArea.addEventListener('dragleave', () => inputArea.classList.remove('drag-over'));
    inputArea.addEventListener('drop', (e) => {
        inputArea.classList.remove('drag-over');
        handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        selectedFiles = Array.from(files);
        filePreviewArea.innerHTML = ''; 
        selectedFiles.forEach((file) => {
            const previewDiv = document.createElement('div'); previewDiv.className = 'file-preview-item';
            if (file.type.startsWith('image/')) { 
                const img = document.createElement('img'); img.src = createSafeURL(file); previewDiv.appendChild(img); 
            } else { 
                previewDiv.innerHTML = `<span style="font-size: 24px;">📁</span>`; 
            }
            previewDiv.innerHTML += `<div class="ready-check">✓</div>`;
            filePreviewArea.appendChild(previewDiv);
        });
        chatInput.focus();
    }

    // Helper to copy text from button
    function copyToClipboard(btn, text) {
        navigator.clipboard.writeText(text);
        const originalSvg = btn.innerHTML;
        btn.style.color = '#00ff66';
        setTimeout(() => { btn.style.color = ''; }, 1000);
    }

    // --- SOCKET.IO SEND MESSAGE ---
    async function handleSend() {
        const text = chatInput.value;
        if (!text.trim() && selectedFiles.length === 0) return;

        // Convert files to base64 strings so they can travel across the network easily
        const filePromises = selectedFiles.map(file => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve({ type: file.type, data: e.target.result });
                reader.readAsDataURL(file);
            });
        });
        
        const processedFiles = await Promise.all(filePromises);

        // Package the data for the server
        const messageData = {
            user: currentUser,
            text: text,
            files: processedFiles,
            timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        };

        // Send to server
        socket.emit('chat message', messageData);

        // Clear input area immediately
        chatInput.value = ''; 
        chatInput.style.height = 'auto'; 
        fileInput.value = ''; 
        selectedFiles = []; 
        filePreviewArea.innerHTML = ''; 
        clearTimeout(typingTimeout); 
        typingIndicator.style.display = 'none';
    }

    sendBtn.addEventListener('click', handleSend);
    chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });

    // --- SOCKET.IO RECEIVE MESSAGE ---
    socket.on('chat message', (data) => {
        renderIncomingMessage(data);
    });

    function renderIncomingMessage(data) {
        if (data.text.trim()) checkKeywords(data.text);

        const msgDiv = document.createElement('div'); 
        msgDiv.className = 'message anim-text';
        
        // Clean template literal structure
        msgDiv.innerHTML = `
            <div class="user-header">
                <img src="${data.user.avatarUrl}" class="chat-avatar">
                <span class="username stencil-font">${data.user.name}</span>
                <span class="timestamp">${data.timestamp}</span>
            </div>
            ${data.text.trim() ? `<div class="msg-text">${parseMarkdown(data.text)}</div>` : ''}
            <div class="msg-actions">
                 <button class="action-btn" title="Copy" onclick="copyToClipboard(this, '${data.text.replace(/'/g, "\\'")}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                 </button>
            </div>
        `;

        // Handle incoming files
        if (data.files && data.files.length > 0) {
            data.files.forEach(file => {
                let mediaTag;
                if (file.type.startsWith('image/')) {
                    mediaTag = document.createElement('img');
                } else if (file.type.startsWith('video/')) {
                    mediaTag = document.createElement('video');
                    mediaTag.controls = true;
                }
                
                if (mediaTag) {
                    mediaTag.src = file.data; // Use the base64 string
                    mediaTag.className = 'media-attachment';
                    msgDiv.appendChild(mediaTag);
                }
            });
        }

        chatContainer.appendChild(msgDiv);
        playBeep(data.user.name === currentUser.name ? 'send' : 'receive');
        
        if(!isScrolledUp) { 
            requestAnimationFrame(() => { chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' }); }); 
        }
    }
</script>

</body>
</html>
